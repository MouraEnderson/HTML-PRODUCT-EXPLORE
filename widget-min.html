<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta charset="UTF-8" />
  <title>BOM Analytics — teste UWA</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 0; }
    .ok { padding: 16px; color: #1b5e20; font-weight: bold; font-size: 15px; background: #e8f5e9; }
    .hint { padding: 12px; font-size: 12px; color: #005686; background: #e3f2fd; }
  </style>
  <script type="text/javascript">
  //<![CDATA[
    var GH = 'https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/';
    var HTML =
      '<div class="ok">BOM Analytics — widget UWA OK</div>' +
      '<div class="hint">Carregando dashboard completo em 2s…<br/>' +
      'Se ficar aqui, troque a URL do app para <b>widget-uwa.html</b></div>';

    function goFull() {
      if (typeof widget === 'undefined' || !widget || !widget.body) return;
      widget.body.innerHTML =
        '<div class="hint" style="background:#fff3e0;">Carregando widget-uwa…</div>';
      window.location.replace(GH + 'widget-uwa.html');
    }

    function onLoad() {
      if (!widget || !widget.body) return;
      widget.body.innerHTML = HTML;
      window.setTimeout(goFull, 2000);
    }

    function wait() {
      if (typeof widget !== 'undefined' && widget && widget.addEvent) {
        widget.addEvent('onLoad', onLoad);
        return;
      }
      setTimeout(wait, 100);
    }
    wait();
  //]]>
  </script>
</head>
<body><p class="hint">Aguardando widget…</p></body>
</html>
