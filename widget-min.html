<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta charset="UTF-8" />
  <title>BOM Test</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 16px; color: #005686; }
  </style>
  <script type="text/javascript">
  //<![CDATA[
    var BOM_MSG = '<div style="padding:8px 0;font-weight:bold;font-size:15px;">BOM Analytics — widget UWA OK</div>';
    if (typeof widget !== 'undefined' && widget && widget.addEvent) {
      widget.addEvent('onLoad', function () {
        widget.body.innerHTML = BOM_MSG;
      });
    } else {
      document.addEventListener('DOMContentLoaded', function () {
        document.body.innerHTML = BOM_MSG +
          '<p>Modo teste no Chrome. No 3DDashboard deve aparecer só a frase verde acima.</p>';
      });
    }
  //]]>
  </script>
</head>
<body>
  <p>Carregando teste UWA…</p>
</body>
</html>
