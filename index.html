<!DOCTYPE html>
<html lang="pt-BR" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>BOM Analytics</title>
  <script>
    (function () {
      var REPO = 'https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/';
      var host = (location.hostname || '').toLowerCase();
      var onGithub = host.indexOf('github.io') >= 0;
      var onLocal = host === 'localhost' || host === '127.0.0.1';
      window.__3DX_REPO_BASE__ = REPO;
      window.__3DX_USE_LOCAL_ASSETS__ = onGithub || onLocal;
      if (!onGithub && !onLocal) {
        var base = document.createElement('base');
        base.href = REPO;
        document.head.appendChild(base);
      }
      function loadScript(src) {
        var s = document.createElement('script');
        s.src = (onGithub || onLocal) ? src : REPO + src;
        s.async = false;
        document.head.appendChild(s);
      }
      loadScript('assets/vendor/chart.umd.min.js');
      loadScript('assets/vendor/xlsx.full.min.js');
    })();
  </script>
  <link rel="stylesheet" href="assets/css/dashboard.css?v=20260603" />
</head>
<body class="ui-clean">
  <header class="app-header clean-header">
    <div class="header-product">
      <h1>BOM Analytics</h1>
      <p class="selection-line">Explorer: <strong id="selectionLabel">nenhum produto</strong></p>
    </div>
    <div class="header-actions">
      <button type="button" class="btn btn-primary" id="btnSyncExplorer" title="Usa o produto aberto no Product Structure Explorer">Do Explorer</button>
      <div class="search-group">
        <input type="search" id="platformSearchInput" placeholder="Nome do produto…" autocomplete="off" />
        <button type="button" class="btn btn-primary" id="btnPlatformSearch">Pesquisar</button>
      </div>
      <button type="button" class="btn" id="btnRefresh">Atualizar</button>
      <button type="button" class="btn btn-ghost" id="btnExport" title="Exportar Excel">Excel</button>
    </div>
  </header>

  <div id="platformSearchResults" class="platform-search-results"></div>
  <div id="statusBar" class="status-bar">Inicializando…</div>

  <!-- IDs usados pelo JS (ocultos) -->
  <div class="ui-hidden" aria-hidden="true">
    <input type="text" id="explorerObjectId" value="" />
    <input type="text" id="explorerObjectName" value="" />
    <button type="button" id="btnLoadObjectId"></button>
    <button type="button" id="btnCopyHelp"></button>
    <div id="syncHelpText"></div>
    <section id="dropZone"></section>
    <input type="file" id="fileInput" />
    <button id="btnLoadDrone"></button>
    <button id="btnImportPaste"></button>
    <button id="btnSampleImport"></button>
    <textarea id="pasteArea"></textarea>
    <div id="externalBanner" class="hidden"></div>
    <select id="filterMaturity"><option value="all">all</option></select>
    <select id="filterType"><option value="all">all</option></select>
    <select id="filterApproval"><option value="all">all</option></select>
    <select id="filterPP"><option value="all">all</option></select>
    <button id="btnExpandAll"></button>
  </div>

  <main class="main-clean">
    <section id="kpiGrid" class="kpi-grid kpi-compact" aria-label="Resumo"></section>

    <div class="filter-row">
      <input type="search" id="searchInput" placeholder="Filtrar na lista…" />
    </div>

    <section class="split-panel split-clean">
      <div class="panel">
        <div class="panel-header">Estrutura</div>
        <div id="bomTree" class="bom-tree"></div>
      </div>
      <div class="panel">
        <div class="panel-header">Detalhes</div>
        <div class="table-scroll table-scroll-wide">
          <table id="bomTable" class="data-table">
            <thead><tr></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="loadingOverlay" class="loading-overlay hidden">Carregando E-BOM…</div>

  <script src="assets/js/config.js?v=20260603"></script>
  <script src="assets/js/platform/widget-runtime.js?v=20260603"></script>
  <script src="assets/js/platform/platform-bridge.js?v=20260603"></script>
  <script src="assets/js/platform/context.js?v=20260603"></script>
  <script src="assets/js/platform/compass.js?v=20260603"></script>
  <script src="assets/js/platform/waf-client.js?v=20260603"></script>
  <script src="assets/js/integration/3dx-content-parser.js?v=20260603"></script>
  <script src="assets/js/integration/enovia-api.js?v=20260603"></script>
  <script src="assets/js/integration/search-api.js?v=20260603"></script>
  <script src="assets/js/integration/product-explorer-bridge.js?v=20260603"></script>
  <script src="assets/js/services/file-import-service.js?v=20260603"></script>
  <script src="assets/js/services/product-search-service.js?v=20260603"></script>
  <script src="assets/js/services/attribute-service.js?v=20260603"></script>
  <script src="assets/js/services/physical-product-service.js?v=20260603"></script>
  <script src="assets/js/services/bom-service.js?v=20260603"></script>
  <script src="assets/js/processing/bom-normalizer.js?v=20260603"></script>
  <script src="assets/js/processing/metrics-engine.js?v=20260603"></script>
  <script src="assets/js/processing/anomaly-detector.js?v=20260603"></script>
  <script src="assets/js/ui/kpi-cards.js?v=20260603"></script>
  <script src="assets/js/ui/charts-manager.js?v=20260603"></script>
  <script src="assets/js/ui/filters.js?v=20260603"></script>
  <script src="assets/js/ui/data-table.js?v=20260603"></script>
  <script src="assets/js/ui/bom-tree.js?v=20260603"></script>
  <script src="assets/js/ui/product-search-panel.js?v=20260603"></script>
  <script src="assets/js/ui/explorer-sync-panel.js?v=20260603"></script>
  <script src="assets/js/ui/drop-zone.js?v=20260603"></script>
  <script src="assets/js/app.js?v=20260603"></script>
  <script>
    try {
      if (typeof widget !== 'undefined' && widget && typeof WidgetRuntime !== 'undefined') {
        WidgetRuntime.bindWidgetEvents();
      }
    } catch (e) { /* */ }
  </script>
</body>
</html>
