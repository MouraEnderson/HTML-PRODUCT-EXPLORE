services:
  - type: web
    name: html-product-explore-bom-resolver
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CORS_ORIGIN
        value: https://mouraenderson.github.io
      - key: SPACE_URL
        value: https://r1132100929518-us1-space.3dexperience.3ds.com/enovia
      - key: SECURITY_CONTEXT
        value: ctx::VPLMProjectLeader.Company Name.CS_IMPLANTACAO
      - key: BOM_MAX_ITEMS
        value: 20000
      - key: BOM_PAGE_SIZE
        value: 100
      - key: BOM_MAX_DEPTH
        value: 40
      - key: AUTO_CSRF
        value: false
      - key: ENOVIA_BEARER_TOKEN
        sync: false
      - key: ENO_CSRF_TOKEN
        sync: false
      - key: ENOVIA_COOKIE
        sync: false
