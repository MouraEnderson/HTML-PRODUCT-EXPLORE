  <title>BOM Analytics 08i</title>
  <style>
    html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:Segoe UI,Arial,sans-serif;background:#f4f7fb;color:#233}.bom-hidden{display:none!important}.bom-widget-body{height:100%;min-height:100%}.bom-layout-page{display:grid;grid-template-columns:repeat(10,minmax(0,1fr));grid-template-rows:auto minmax(72px,30%) minmax(0,1fr);width:100%;height:100%;gap:4px;padding:0 4px 4px;box-sizing:border-box;overflow:hidden}.bom-zone-1{grid-column:1/-1;grid-row:1}.bom-zone-2{grid-column:1/6;grid-row:2;overflow:hidden;display:flex;flex-direction:column}.bom-zone-3{grid-column:6/11;grid-row:2;overflow:hidden}.bom-zone-4{grid-column:1/7;grid-row:3;overflow:hidden}.bom-zone-5{grid-column:7/11;grid-row:3;overflow:hidden}.bom-topbar{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:#fff;border-radius:8px}.bom-topbar-left{display:flex;gap:10px;align-items:center}.bom-topbar-brand{font-weight:700;color:#1f5fbf}.bom-topbar-product{font-size:.78rem}.bom-topbar-actions{display:flex;gap:6px;align-items:center}.bom-btn{border:1px solid #cfd8e3;border-radius:8px;background:#fff;padding:5px 10px;cursor:pointer}.bom-btn-primary{background:#2563eb;color:#fff;border-color:#2563eb;font-weight:700}.bom-build-pill,.bom-topbar-clock{font-size:.7rem;border:1px solid #cfd8e3;border-radius:12px;padding:3px 7px;background:#eef3f8}.bom-quad,.bom-ebom-block,.bom-part-preview{background:#fff;border:1px solid #d8e0ea;border-radius:8px;box-sizing:border-box}.bom-zone-2-scroll{flex:1;overflow-y:auto}.bom-filter-bar-quad{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,.9fr) minmax(0,1fr) minmax(0,2fr) auto;gap:5px;padding:6px}.bom-filter-item{display:flex;flex-direction:column;gap:2px;font-size:.65rem;color:#5c6b7a}.bom-filter-item select,.bom-filter-item input,.bom-input{width:100%;box-sizing:border-box;border:1px solid #d8e0ea;border-radius:6px;padding:5px 6px;font-size:.76rem}.stat-markers-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:4px;padding:4px 6px}.bom-st{padding:4px 8px;font-size:.72rem;border-top:1px solid #e5ebf2}.bom-st-ok{color:#0a7a2f}.bom-st-err{color:#b42318}.bom-sync-banner{margin:5px 6px;padding:5px 7px;border-radius:6px;background:#fff3cd;color:#8a5300;font-size:.72rem}.bom-charts-unified-scroll{height:100%;overflow:auto;padding:2px 6px}.bom-charts-row-quad{display:grid;grid-template-columns:1fr 1fr;gap:6px}.bom-chart-heading{text-align:center;margin:2px 0 3px;font-size:.78rem}.bom-chart-canvas-box{height:110px;position:relative}.bom-chart-canvas-box canvas{width:100%!important;height:100%!important}.bom-ebom-block{height:100%;display:flex;flex-direction:column}.bom-ebom-head{padding:6px 10px;border-bottom:1px solid #e5ebf2}.bom-ebom-head h2{font-size:.86rem;margin:0}.bom-ebom-list{flex:1;min-height:0;display:flex;flex-direction:column}.table-scroll{flex:1;min-height:0;overflow:auto}.bom-table{width:100%;border-collapse:collapse;font-size:.75rem}.bom-table th,.bom-table td{border-bottom:1px solid #edf1f6;padding:6px 8px;text-align:left}.bom-table-pager{padding:5px 8px;text-align:right;font-size:.72rem;border-top:1px solid #e5ebf2}.bom-preview-quad{height:100%;padding:10px}.bom-preview-body{height:100%;display:flex;flex-direction:column;gap:8px}.bom-preview-image{flex:1;min-height:140px;background:#e9eef3;border-radius:8px;display:flex;align-items:center;justify-content:center}.bom-preview-placeholder{color:#2669ca;font-weight:700}.bom-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.75);font-weight:700}
  </style>
  <script>
    window.__3DX_TRUSTED_WIDGET__=true;window.__3DX_BOOT_DEFER__=true;
    var GH='https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/';
    var BOM_BUILD='bom20260612a';var BASE_BUILD='bom20260607a';
    function mountTarget(){return (typeof widget!=='undefined'&&widget&&widget.body)?widget.body:document.body;}
    function uiRoot(){return window.__3DX_UI_ROOT__||mountTarget();}
    function setBar(msg,kind){var el=uiRoot()&&uiRoot().querySelector('#statusBar');if(!el)return;el.textContent=msg;el.className='bom-st';if(kind==='ok')el.className+=' bom-st-ok';if(kind==='error')el.className+=' bom-st-err';}
    function updateBuildLabel(){try{var id=window.__BOM_BUILD_ID__||BOM_BUILD;var p=uiRoot().querySelector('.bom-build-pill');if(p)p.textContent=id;var t=uiRoot().querySelector('#buildTag');if(t)t.textContent=id;}catch(e){}}
    function paint(){var b=mountTarget();if(!b)return;b.innerHTML='<div class="bom-root bom-dashboard bom-theme-gray ui-clean bom-layout-page"><header class="bom-zone-1 bom-topbar"><div class="bom-topbar-left"><span class="bom-topbar-brand">BOM Analytics</span><span class="bom-topbar-product" id="selectionLabel" title="-">-</span></div><div class="bom-topbar-actions"><button type="button" id="btnImportPaste" class="bom-btn bom-btn-primary">Atualizar estrutura</button><span class="bom-topbar-clock"><span id="lastUpdateClock" class="bom-clock-time">--:--:--</span></span><button type="button" id="btnThemeToggle" class="bom-btn bom-btn-secondary bom-btn-compact">Tema</button><span class="bom-build-pill">'+BOM_BUILD+'</span><details class="bom-topbar-more"><summary>Avançado</summary><div id="bomRulesPanel"></div><input type="text" id="explorerObjectId" class="bom-input" placeholder="ID físico"/><button type="button" id="btnLoadPhysicalId" class="bom-btn bom-btn-secondary">Varrer por ID</button><button type="button" id="btnApiDiagnostic" class="bom-btn bom-btn-secondary">Diagnosticar API</button><textarea id="apiDiagReport" class="bom-input bom-hidden" rows="6" readonly="readonly"></textarea><textarea id="pasteArea" class="bom-paste bom-hidden"></textarea></details></div></header><section class="bom-quad bom-zone-2"><div class="bom-zone-2-scroll"><div id="syncBanner" class="bom-sync-banner bom-hidden">Abra a estrutura no Explorer e clique <strong>Atualizar estrutura</strong>.</div><div class="bom-filter-bar bom-filter-bar-quad"><label class="bom-filter-item"><span>Maturidade</span><select id="filterMaturity"><option value="all">Todas</option><option value="released">Bom (Aprovado)</option><option value="in_work">Moderado</option><option value="obsolete">Ruim</option><option value="other">Outros</option></select></label><label class="bom-filter-item"><span>Tipo</span><select id="filterType"><option value="all">Todos</option></select></label><label class="bom-filter-item"><span>Aprovação</span><select id="filterApproval"><option value="all">Todas</option><option value="approved">Aprovado</option><option value="pending">Pendente</option></select></label><label class="bom-filter-item"><span>Buscar</span><input type="search" id="searchInput" placeholder="Nome, descrição, proprietário…"/></label><button type="button" id="btnClearFilters" class="bom-btn">Limpar</button></div><section id="kpiGrid" class="stat-markers-row"></section></div><div id="statusBar" class="bom-st">Carregando…</div></section><section class="bom-quad bom-zone-3" id="chartsSection"><div class="bom-charts-unified-scroll"><section class="bom-charts-row bom-charts-row-quad"><div class="bom-chart-panel"><h3 class="bom-chart-heading">Saúde da Maturidade</h3><div class="bom-chart-canvas-box"><canvas id="chartMaturity"></canvas></div><div id="maturityLegendScroll" class="bom-chart-legend-list"></div></div><div class="bom-chart-panel bom-chart-owners"><h3 class="bom-chart-heading">Proprietários</h3><div class="bom-chart-canvas-box"><canvas id="chartOwners"></canvas></div><div id="ownersLegendScroll" class="bom-chart-legend-list"></div></div></section></div></section><section class="bom-quad bom-zone-4"><section class="bom-ebom-block"><div class="bom-ebom-head"><h2>E-BOM — <span id="tableProductLabel">-</span></h2><p id="ebomMeta" class="bom-ebom-meta bom-hidden">Clique numa linha para ver preview 3D à direita.</p></div><div class="bom-ebom-list"><div class="bom-table-wrap table-scroll"><table id="bomTable" class="bom-table"><thead><tr></tr></thead><tbody></tbody></table></div><footer id="tablePager" class="bom-table-pager">0 peças</footer></div></section></section><section class="bom-quad bom-zone-5"><div class="bom-part-preview bom-preview-quad" id="partPreviewPanel"><div class="bom-preview-body"><p class="bom-preview-hint">Clique numa linha da E-BOM</p><div id="partPreviewImage" class="bom-preview-image"><span class="bom-preview-placeholder">Clique numa linha da E-BOM para visualização 3D</span></div><div id="partPreviewMeta" class="bom-preview-meta"></div></div></div></section><button type="button" id="btnScanExplorer" class="bom-hidden">Varrer</button><div id="loadingOverlay" class="bom-loading bom-hidden">Processando…</div><span class="bom-build-tag bom-hidden" id="buildTag">'+BOM_BUILD+'</span><div class="bom-hidden" id="hiddenFields"><canvas id="chartType"></canvas><canvas id="chartRevision"></canvas><canvas id="chartApproval"></canvas><input type="text" id="explorerObjectName"/><select id="filterPP"><option value="all">all</option></select></div></div>';b.className='bom-widget-body';b.style.minHeight='100%';b.style.height='100%';window.__3DX_UI_ROOT__=b;}
    function getRequire(){if(typeof widget!=='undefined'&&widget&&widget.requirejs)return widget.requirejs;if(typeof require!=='undefined')return require;return null;}
    function loadScript(url,optional,next){var s=document.createElement('script');s.type='text/javascript';s.charset='UTF-8';s.src=url;s.onload=function(){if(next)next(null);};s.onerror=function(){if(optional){if(next)next(null);}else if(next)next('erro '+url);};document.getElementsByTagName('head')[0].appendChild(s);}
    function loadWaf(next){if(typeof WAFData!=='undefined'&&WAFData.authenticatedRequest){next(null);return;}var req=getRequire();if(!req){next(null);return;}req(['DS/WAFData/WAFData','DS/i3DXCompassServices/i3DXCompassServices','DS/PlatformAPI/PlatformAPI'],function(WAF,Compass,PAPI){window.WAFData=WAF;window.__3DX_COMPASS__=Compass;window.__3DX_PLATFORM_API__=PAPI;next(null);},function(){next(null);});}
    function startBundle(){var v=BOM_BUILD+'-'+Date.now();loadScript(GH+'assets/vendor/chart.umd.min.js?v='+v,true,function(){loadScript(GH+'assets/js/bom-bundle-'+BASE_BUILD+'.js?v='+v,false,function(err){if(err){setBar('Erro ao carregar bundle base.','error');return;}loadScript(GH+'assets/js/bom-api-id-hotfix-20260608a.js?v='+v,false,function(err2){if(err2){setBar('Erro ao carregar patch 08i.','error');return;}try{updateBuildLabel();if(typeof detectRuntimeMode==='function')detectRuntimeMode();if(typeof window.__bomBridgeInstall==='function')window.__bomBridgeInstall();if(typeof App!=='undefined'&&App.run){App.run();if(App.rebindScanButton)App.rebindScanButton();if(App.rebindImportButton)App.rebindImportButton();if(typeof window.__bomBridgeInstall==='function')window.__bomBridgeInstall();updateBuildLabel();setBar('Build '+(window.__BOM_BUILD_ID__||BOM_BUILD)+' carregado. Clique Atualizar estrutura.','ok');}else{setBar('App não iniciou.','error');}}catch(ex){setBar('Erro: '+(ex.message||ex),'error');}});});});}
    function loadCss(next){var l=document.createElement('link');l.rel='stylesheet';l.href=GH+'assets/css/dashboard.css?v='+BOM_BUILD+'-'+Date.now();l.onload=function(){if(next)next();};l.onerror=function(){if(next)next();};document.getElementsByTagName('head')[0].appendChild(l);}
    function executeInit(){paint();setBar('Carregando build 20260612a…','info');loadCss(function(){loadWaf(function(){startBundle();});});}
    function boot(){if(typeof widget!=='undefined'&&widget){if(widget.addEvent)widget.addEvent('onLoad',executeInit);if(widget.addEvent)widget.addEvent('onRefresh',executeInit);if(widget.body)executeInit();else setTimeout(boot,80);}else if(document.body){if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',executeInit);else executeInit();}else setTimeout(boot,80);}boot();
  </script>
