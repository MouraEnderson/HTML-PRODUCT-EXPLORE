<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>BOM Analytics</title>
  <style type="text/css">
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Segoe UI", sans-serif; }
    .bom-hidden { display: none !important; }
    /* Grid 5 zonas — crítico inline (não depende de cache do dashboard.css) */
    .bom-layout-page {
      display: grid !important;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      grid-template-rows: auto minmax(72px, 30%) minmax(0, 1fr);
      width: 100%;
      height: 100%;
      gap: 4px;
      padding: 0 4px 4px;
      overflow: hidden;
      box-sizing: border-box;
    }
    .bom-zone-1 { grid-column: 1 / -1; grid-row: 1 !important; min-height: 0; }
    .bom-zone-2 { grid-column: 1 / 6; grid-row: 2 !important; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
    .bom-zone-2-scroll {
      flex: 1 1 auto; min-height: 0; max-height: 100%;
      overflow-x: hidden; overflow-y: scroll; -webkit-overflow-scrolling: touch;
    }
    .bom-zone-1.bom-topbar {
      padding: 2px 8px !important; min-height: 0 !important; gap: 6px;
      align-items: center; border: none; border-radius: 8px;
    }
    .bom-zone-1 .bom-btn-primary { padding: 5px 10px !important; font-size: 0.78rem !important; line-height: 1.2 !important; }
    .bom-zone-1 .bom-topbar-brand { font-size: 0.82rem !important; }
    .bom-zone-1 .bom-topbar-product { font-size: 0.76rem !important; }
    .bom-zone-1 .bom-btn-compact, .bom-zone-1 .bom-topbar-clock { padding: 4px 8px !important; font-size: 0.74rem !important; }
    .bom-zone-1 .bom-build-pill { padding: 1px 5px; font-size: 0.6rem; }
    .bom-zone-3 { grid-column: 6 / 11; grid-row: 2 !important; min-height: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-start; }
    .bom-zone-4 { grid-column: 1 / 7; grid-row: 3 !important; min-height: 0; overflow: hidden; }
    .bom-zone-5 { grid-column: 7 / 11; grid-row: 3 !important; min-height: 0; overflow: hidden; }
    .bom-charts-unified-scroll {
      flex: 0 1 auto; min-height: 0; max-height: 100%;
      overflow-x: hidden; overflow-y: auto; padding: 2px 6px 4px;
    }
    .bom-charts-row-quad {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px; align-items: start;
    }
    .bom-zone-3 .bom-chart-panel {
      border: none; background: transparent; padding: 0 2px; box-shadow: none;
      display: flex; flex-direction: column; align-items: stretch;
      height: auto !important; min-height: 0; overflow: visible;
    }
    .bom-chart-heading {
      margin: 0 0 3px; padding: 0 2px; font-size: 0.78rem; font-weight: 600; color: #263238;
      line-height: 1.2; text-align: center; flex: 0 0 auto;
    }
    .bom-chart-canvas-box {
      width: 100%; height: 110px; min-height: 110px; max-height: 110px;
      position: relative; flex: 0 0 110px; overflow: hidden;
    }
    .bom-zone-3 .bom-chart-canvas-box canvas {
      display: block !important; width: 100% !important; height: 100% !important; max-height: 110px !important;
    }
    .cf-pie-quad-holder {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    }
    .cf-pie.cf-pie-quad { width: 88px; height: 88px; min-height: 0; border-radius: 50%; position: relative; }
    .cf-pie-hole.cf-pie-hole-quad { inset: 30%; font-size: 0.72rem; }
    .bom-zone-3 .bom-chart-canvas-box > div {
      position: absolute !important; left: 0 !important; top: 0 !important;
      width: 100% !important; height: 100% !important; max-height: 110px !important;
    }
    .bom-zone-3 .bom-chart-legend-list {
      margin: 0; padding: 0 2px; overflow: visible !important; max-height: none !important;
      border: none !important;
    }
    .bom-zone-3 .bom-chart-legend-list .owners-legend-item {
      font-size: 0.66rem; padding: 1px 0; gap: 4px;
    }
    .bom-filter-bar-quad {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 0.85fr) minmax(0, 0.95fr) minmax(0, 2fr) auto;
      gap: 4px 5px;
      padding: 5px 6px;
      border-bottom: 1px solid #dde3ea;
      align-items: end;
    }
    .bom-f-clear { align-self: end; width: auto; white-space: nowrap; padding: 5px 10px; font-size: 0.76rem; font-weight: 600; }
    .bom-filter-bar-quad .bom-filter-item { min-width: 0; }
    .bom-filter-bar-quad .bom-filter-item span { font-size: 0.65rem; font-weight: 600; color: #5c6b7a; }
    .bom-filter-bar-quad select, .bom-filter-bar-quad input {
      width: 100%; min-width: 0; padding: 5px 6px; font-size: 0.76rem;
      border: 1px solid #dde3ea; border-radius: 5px; box-sizing: border-box;
    }
    .stat-markers-row.stat-markers-quad {
      display: grid !important;
      grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
      gap: 4px !important;
      padding: 4px 6px !important;
      flex: 0 0 auto !important;
      align-content: start !important;
      min-height: 0;
    }
    .stat-markers-quad .stat-marker {
      border: 1px solid #dde3ea; border-radius: 6px; background: #fff;
      padding: 4px 6px; min-width: 0; text-align: center;
    }
    .stat-markers-quad .stat-marker-label { font-size: 0.62rem !important; margin-bottom: 2px !important; line-height: 1.15; }
    .stat-markers-quad .stat-marker-value { font-size: 1.05rem !important; line-height: 1.1; }
  </style>
  <script type="text/javascript">
  //<![CDATA[
    window.__3DX_TRUSTED_WIDGET__ = true;
    window.__3DX_BOOT_DEFER__ = true;

    var BOM_BUILD = 'bom20260605i';
    var GH = 'https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/';
    var BUNDLE;

    (function parseEmbedEarly() {
      function pq(s) {
        var q = {}, x = String(s || '').replace(/^\?/, '');
        if (!x) return q;
        x.split('&').forEach(function (p) {
          var a = p.split('=');
          if (a[0]) q[decodeURIComponent(a[0])] = decodeURIComponent(a[1] || '');
        });
        return q;
      }
      function fromUrl(url, out) {
        if (!url) return out;
        var u = String(url), i = u.indexOf('?');
        if (i >= 0) { var q = pq(u.slice(i)); for (var k in q) if (q[k]) out[k] = q[k]; }
        var m = u.match(/[?&]uwaUrl=([^&]+)/i);
        if (m && m[1]) try { fromUrl(decodeURIComponent(m[1]), out); } catch (e) {}
        return out;
      }
      var eq = {};
      fromUrl(location.href, eq);
      fromUrl(location.search, eq);
      try { if (frameElement && frameElement.src) fromUrl(frameElement.src, eq); } catch (e) {}
      window.__3DX_EMBED_QUERY__ = eq;
    })();

    (function applyBuildFromQuery() {
      var eq = window.__3DX_EMBED_QUERY__ || {};
      if (eq.v && /^bom20/.test(eq.v)) BOM_BUILD = eq.v;
      else if (eq.build && /^bom20/.test(eq.build)) BOM_BUILD = eq.build;
      BUNDLE = GH + 'assets/js/bom-bundle-' + BOM_BUILD + '.js';
    })();

    var UI_HTML =
      '<div class="bom-root bom-dashboard bom-theme-gray ui-clean bom-layout-page">' +
      '<header class="bom-zone-1 bom-topbar">' +
      '<div class="bom-topbar-left">' +
      '<span class="bom-topbar-brand">BOM Analytics</span>' +
      '<span class="bom-topbar-product" id="selectionLabel" title="-">-</span>' +
      '</div>' +
      '<div class="bom-topbar-actions">' +
      '<button type="button" id="btnImportPaste" class="bom-btn bom-btn-primary">Atualizar estrutura</button>' +
      '<span class="bom-topbar-clock" title="\u00daltima atualiza\u00e7\u00e3o">' +
      '<span id="lastUpdateClock" class="bom-clock-time">--:--:--</span></span>' +
      '<button type="button" id="btnThemeToggle" class="bom-btn bom-btn-secondary bom-btn-compact">Tema</button>' +
      '<span class="bom-build-pill" title="Build">' + BOM_BUILD + '</span>' +
      '<details class="bom-topbar-more">' +
      '<summary>Avan\u00e7ado</summary>' +
      '<div id="bomRulesPanel"></div>' +
      '<input type="text" id="explorerObjectId" class="bom-input" placeholder="ID f\u00edsico" />' +
      '<button type="button" id="btnLoadPhysicalId" class="bom-btn bom-btn-secondary">Varrer por ID</button>' +
      '<textarea id="pasteArea" class="bom-paste" placeholder="Colar grade Explorer (Ctrl+V)"></textarea>' +
      '</details>' +
      '</div></header>' +
      '<section class="bom-quad bom-zone-2" aria-label="Filtros e estat\u00edsticas">' +
      '<div class="bom-zone-2-scroll">' +
      '<div id="syncBanner" class="bom-sync-banner bom-sync-inline bom-sync-info bom-hidden">' +
      'Abra a estrutura no Explorer e clique <strong>Atualizar estrutura</strong>.</div>' +
      '<div class="bom-filter-bar bom-filter-bar-quad">' +
      '<label class="bom-filter-item bom-f-mat"><span>Maturidade</span>' +
      '<select id="filterMaturity"><option value="all">Todas</option>' +
      '<option value="released">Bom (Aprovado)</option><option value="in_work">Moderado</option>' +
      '<option value="obsolete">Ruim</option><option value="other">Outros</option></select></label>' +
      '<label class="bom-filter-item bom-f-type"><span>Tipo</span><select id="filterType"><option value="all">Todos</option></select></label>' +
      '<label class="bom-filter-item bom-f-appr"><span>Aprova\u00e7\u00e3o</span>' +
      '<select id="filterApproval"><option value="all">Todas</option>' +
      '<option value="approved">Aprovado</option><option value="pending">Pendente</option></select></label>' +
      '<label class="bom-filter-item bom-filter-grow bom-f-search"><span>Buscar</span>' +
      '<input type="search" id="searchInput" placeholder="Nome, descri\u00e7\u00e3o, propriet\u00e1rio\u2026" /></label>' +
      '<button type="button" id="btnClearFilters" class="bom-btn bom-btn-filter-clear bom-f-clear">Limpar</button>' +
      '</div>' +
      '<section id="kpiGrid" class="stat-markers-row stat-markers-compact stat-markers-quad" aria-label="Estat\u00edsticas"></section>' +
      '</div>' +
      '<div id="statusBar" class="bom-st bom-st-inline bom-st-quad">Carregando\u2026</div>' +
      '</section>' +
      '<section class="bom-quad bom-zone-3" id="chartsSection" aria-label="Gr\u00e1ficos">' +
      '<div class="bom-charts-unified-scroll">' +
      '<section class="bom-charts-row bom-charts-row-quad">' +
      '<div class="bom-chart-panel">' +
      '<h3 class="bom-chart-heading">Sa\u00fade da Maturidade</h3>' +
      '<div class="bom-chart-canvas-box"><canvas id="chartMaturity"></canvas></div>' +
      '<div id="maturityLegendScroll" class="bom-chart-legend-list"></div></div>' +
      '<div class="bom-chart-panel bom-chart-owners">' +
      '<h3 class="bom-chart-heading">Propriet\u00e1rios</h3>' +
      '<div class="bom-chart-canvas-box"><canvas id="chartOwners"></canvas></div>' +

      '<h2>E-BOM \u2014 <span id="tableProductLabel" title="-">-</span></h2>' +

      '</div>' +
      '<div class="bom-ebom-list">' +
      '<div class="bom-table-wrap table-scroll">' +
      '<table id="bomTable" class="bom-table"><thead><tr></tr></thead><tbody></tbody></table>' +
      '</div>' +
      '<footer id="tablePager" class="bom-table-pager">0 pe\u00e7as</footer>' +
      '</div></section></section>' +
      '<section class="bom-quad bom-zone-5" aria-label="Visualiza\u00e7\u00e3o 3D">' +
      '<div class="bom-part-preview bom-preview-quad" id="partPreviewPanel">' +
      '<div class="bom-preview-body">' +
      '<p class="bom-preview-hint">Clique numa linha da E-BOM</p>' +
      '<div id="partPreviewImage" class="bom-preview-image">' +
      '<span class="bom-preview-placeholder">Preview 2D \u00b7 3DPlay em breve</span></div>' +
      '<div id="partPreviewMeta" class="bom-preview-meta"></div>' +
      '</div></div></section>' +
      '<button type="button" id="btnScanExplorer" class="bom-hidden">Varrer</button>' +
      '<div id="loadingOverlay" class="bom-loading bom-hidden">Processando\u2026</div>' +
      '<span class="bom-build-tag bom-hidden" id="buildTag">' + BOM_BUILD + '</span>' +
      '<div class="bom-hidden" id="hiddenFields">' +
      '<canvas id="chartType" class="bom-hidden"></canvas>' +
      '<canvas id="chartRevision" class="bom-hidden"></canvas>' +
      '<canvas id="chartApproval" class="bom-hidden"></canvas>' +
      '<input type="text" id="explorerObjectName" />' +
      '<select id="filterPP"><option value="all">all</option></select>' +
      '</div></div>';

    function mountTarget() {
      if (typeof widget !== 'undefined' && widget && widget.body) return widget.body;
      return document.body;
    }

    function uiRoot() {
      return window.__3DX_UI_ROOT__ || mountTarget();
    }

    function setBar(msg, kind) {
      var el = uiRoot() && uiRoot().querySelector('#statusBar');
      if (!el) return;
      el.textContent = msg;
      el.className = 'bom-st bom-st-inline';
      if (kind === 'ok') el.className += ' bom-st-ok';
      if (kind === 'error') el.className += ' bom-st-err';
    }

    function paint() {
      var b = mountTarget();
      if (!b) return;
      b.innerHTML = UI_HTML;
      b.className = 'bom-widget-body';
      b.style.minHeight = '100%';
      b.style.height = '100%';
      window.__3DX_UI_ROOT__ = b;
    }

    function getRequire() {
      if (typeof widget !== 'undefined' && widget && widget.requirejs) return widget.requirejs;
      if (typeof require !== 'undefined') return require;
      return null;
    }

    function loadScript(url, optional, next) {
      var s = document.createElement('script');
      s.type = 'text/javascript';
      s.charset = 'UTF-8';
      s.src = url;
      s.onload = function () { if (next) next(null); };
      s.onerror = function () { if (optional) { if (next) next(null); } else if (next) next('erro'); };
      document.getElementsByTagName('head')[0].appendChild(s);
    }

    function loadWaf(next) {
      if (typeof WAFData !== 'undefined' && WAFData.authenticatedRequest) {
        next(null);
        return;
      }
      var req = getRequire();
      if (!req) { next(null); return; }
      req(
        ['DS/WAFData/WAFData', 'DS/i3DXCompassServices/i3DXCompassServices', 'DS/PlatformAPI/PlatformAPI'],
        function (WAF, Compass, PAPI) {
          window.WAFData = WAF;
          window.__3DX_COMPASS__ = Compass;
          window.__3DX_PLATFORM_API__ = PAPI;
          next(null);
        },
        function () { next(null); }
      );
    }

    function startBundle() {
      loadScript(GH + 'assets/vendor/chart.umd.min.js?v=' + BOM_BUILD, true, function () {
        loadScript(BUNDLE, false, function (err) {
          if (err) {
            setBar('Erro ao carregar bundle.', 'error');
            return;
          }
          try {
            if (typeof detectRuntimeMode === 'function') detectRuntimeMode();
            if (typeof App !== 'undefined' && App.run) {
              App.run();
              if (App.rebindScanButton) App.rebindScanButton();
              if (App.rebindImportButton) App.rebindImportButton();
            } else {
              setBar('App n\u00e3o iniciou.', 'error');
            }
          } catch (ex) {
            setBar('Erro: ' + (ex.message || ex), 'error');
          }
        });
      });
    }

    function loadCss(next) {
      var l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = GH + 'assets/css/dashboard.css?v=' + BOM_BUILD;
      l.onload = function () { if (next) next(); };
      l.onerror = function () { if (next) next(); };
      document.getElementsByTagName('head')[0].appendChild(l);
    }

    function executeInit() {
      paint();
      setBar('Carregando dashboard\u2026', 'info');
      loadCss(function () {
        loadWaf(function () { startBundle(); });
      });
    }

    function boot() {
      if (typeof widget !== 'undefined' && widget) {
        if (widget.addEvent) widget.addEvent('onLoad', executeInit);
        if (widget.addEvent) widget.addEvent('onRefresh', executeInit);
        if (widget.body) executeInit();
        else window.setTimeout(boot, 80);
      } else if (document.body) {
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', executeInit);
        } else {
          executeInit();
        }
      } else {
        window.setTimeout(boot, 80);
      }
    }
    boot();

  </script>
