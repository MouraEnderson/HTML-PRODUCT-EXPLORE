<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>BOM Analytics</title>
  <style type="text/css">
    html, body { margin: 0; padding: 0; min-height: 100%; font-family: "Segoe UI", sans-serif; }
    .bom-hidden { display: none !important; }
  </style>
  <script type="text/javascript">
  //<![CDATA[
    window.__3DX_TRUSTED_WIDGET__ = true;
    window.__3DX_BOOT_DEFER__ = true;

    var BOM_BUILD = 'bom20260602o';
    var GH = 'https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/';
    var BUNDLE = GH + 'assets/js/bom-bundle-' + BOM_BUILD + '.js';

    (function parseEmbedEarly() {
      function pq(s) {
        var q = {}, x = String(s || '').replace(/^\?/, '');
        if (!x) return q;
        x.split('&').forEach(function (p) {
          var a = p.split('=');
          if (a[0]) q[decodeURIComponent(a[0])] = decodeURIComponent(a[1] || '');
        });
        return q;
      }
      function fromUrl(url, out) {
        if (!url) return out;
        var u = String(url), i = u.indexOf('?');
        if (i >= 0) { var q = pq(u.slice(i)); for (var k in q) if (q[k]) out[k] = q[k]; }
        var m = u.match(/[?&]uwaUrl=([^&]+)/i);
        if (m && m[1]) try { fromUrl(decodeURIComponent(m[1]), out); } catch (e) {}
        return out;
      }
      var eq = {};
      fromUrl(location.href, eq);
      fromUrl(location.search, eq);
      try { if (frameElement && frameElement.src) fromUrl(frameElement.src, eq); } catch (e) {}
      window.__3DX_EMBED_QUERY__ = eq;
    })();

    var UI_HTML =
      '<div class="bom-root bom-dashboard bom-theme-gray ui-clean">' +
      '<header class="bom-dash-header">' +
      '<div class="bom-dash-title">' +
      '<h1>BOM Analytics</h1>' +
      '<p class="bom-dash-sub">Estrutura: <strong id="selectionLabel">-</strong></p>' +
      '</div>' +
      '<div class="bom-dash-toolbar">' +
      '<button type="button" id="btnThemeWhite" class="bom-btn bom-btn-theme" title="Fundo branco">Branco</button>' +
      '<button type="button" id="btnThemeGray" class="bom-btn bom-btn-theme bom-theme-active" title="Fundo cinza">Cinza</button>' +
      '<span class="bom-build-tag" id="buildTag">' + BOM_BUILD + '</span>' +
      '</div>' +
      '</header>' +
      '<div id="statusBar" class="bom-st">Carregando…</div>' +
      '<div class="bom-dash-actions">' +
      '<button type="button" id="btnScanExplorer" class="bom-btn bom-btn-primary bom-hidden">Varrer estrutura</button>' +
      '<button type="button" id="btnImportPaste" class="bom-btn bom-btn-secondary">Importar Ctrl+C</button>' +
      '</div>' +
      '<p class="bom-hint">No Explorer: <b>Ctrl+A</b> na grade → <b>Ctrl+C</b> → <b>Importar Ctrl+C</b>. Funciona com qualquer projeto.</p>' +
      '<div id="kpiGrid" class="bom-kpi-grid"></div>' +
      '<div id="bomRulesPanel" class="bom-rules-wrap"></div>' +
      '<div class="bom-charts bom-charts-grid">' +
      '<div class="bom-chart"><canvas id="chartMaturity"></canvas></div>' +
      '<div class="bom-chart"><canvas id="chartType"></canvas></div>' +
      '<div class="bom-chart"><canvas id="chartRevision"></canvas></div>' +
      '<div class="bom-chart"><canvas id="chartApproval"></canvas></div>' +
      '</div>' +
      '<div class="bom-table-wrap table-scroll">' +
      '<div class="bom-table-head">E-BOM — <span id="tableProductLabel">-</span></div>' +
      '<table id="bomTable" class="bom-table"><thead><tr></tr></thead><tbody></tbody></table></div>' +
      '<details class="bom-advanced">' +
      '<summary>Avançado (ID físico ou cola manual)</summary>' +
      '<input type="text" id="explorerObjectId" placeholder="prd-R1132100929518-…" class="bom-input" />' +
      '<button type="button" id="btnLoadPhysicalId" class="bom-btn bom-btn-secondary">Varrer por ID</button>' +
      '<textarea id="pasteArea" class="bom-paste" placeholder="Ou cole aqui (Ctrl+V)"></textarea>' +
      '</details>' +
      '<div id="loadingOverlay" class="bom-loading bom-hidden">Varrendo…</div>' +
      '<div class="bom-hidden" id="hiddenFields">' +
      '<input type="text" id="explorerObjectName" />' +
      '<input type="search" id="searchInput" />' +
      '<select id="filterMaturity"><option value="all">all</option></select>' +
      '<select id="filterType"><option value="all">all</option></select>' +
      '<select id="filterApproval"><option value="all">all</option></select>' +
      '<select id="filterPP"><option value="all">all</option></select>' +
      '</div></div>';

    function mountTarget() {
      if (typeof widget !== 'undefined' && widget && widget.body) return widget.body;
      return document.body;
    }

    function uiRoot() {
      return window.__3DX_UI_ROOT__ || mountTarget();
    }

    function setBar(msg, kind) {
      var el = uiRoot() && uiRoot().querySelector('#statusBar');
      if (!el) return;
      el.textContent = msg;
      el.className = 'bom-st';
      if (kind === 'ok') el.className = 'bom-st bom-st-ok';
      if (kind === 'error') el.className = 'bom-st bom-st-err';
    }

    function paint() {
      var b = mountTarget();
      if (!b) return;
      b.innerHTML = UI_HTML;
      b.className = 'bom-widget-body';
      b.style.minHeight = '480px';
      window.__3DX_UI_ROOT__ = b;
    }

    function getRequire() {
      if (typeof widget !== 'undefined' && widget && widget.requirejs) return widget.requirejs;
      if (typeof require !== 'undefined') return require;
      return null;
    }

    function loadScript(url, optional, next) {
      var s = document.createElement('script');
      s.type = 'text/javascript';
      s.charset = 'UTF-8';
      s.src = url;
      s.onload = function () { if (next) next(null); };
      s.onerror = function () { if (optional) { if (next) next(null); } else if (next) next('erro'); };
      document.getElementsByTagName('head')[0].appendChild(s);
    }

    function loadWaf(next) {
      if (typeof WAFData !== 'undefined' && WAFData.authenticatedRequest) {
        next(null);
        return;
      }
      var req = getRequire();
      if (!req) {
        next(null);
        return;
      }
      req(
        ['DS/WAFData/WAFData', 'DS/i3DXCompassServices/i3DXCompassServices', 'DS/PlatformAPI/PlatformAPI'],
        function (WAF, Compass, PAPI) {
          window.WAFData = WAF;
          window.__3DX_COMPASS__ = Compass;
          window.__3DX_PLATFORM_API__ = PAPI;
          next(null);
        },
        function () { next(null); }
      );
    }

    function startBundle() {
      loadScript(GH + 'assets/vendor/chart.umd.min.js?v=' + BOM_BUILD, true, function () {
        loadScript(BUNDLE, false, function (err) {
          if (err) {
            setBar('Erro ao carregar bundle. Verifique GitHub Pages.', 'error');
            return;
          }
          try {
            if (typeof detectRuntimeMode === 'function') detectRuntimeMode();
            if (typeof App !== 'undefined' && App.run) {
              App.run();
              if (App.rebindScanButton) App.rebindScanButton();
              if (App.rebindImportButton) App.rebindImportButton();
              window.__3DX_SCAN__ = function () {
                var root = window.__3DX_UI_ROOT__ || document.body;
                var btn = root.querySelector('#btnScanExplorer');
                if (typeof App !== 'undefined' && App.runExplorerScan) App.runExplorerScan(btn);
              };
            } else {
              setBar('App não iniciou. Ver Console (F12).', 'error');
            }
          } catch (ex) {
            setBar('Erro: ' + (ex.message || ex), 'error');
          }
        });
      });
    }

    function loadCss(next) {
      var l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = GH + 'assets/css/dashboard.css?v=' + BOM_BUILD;
      l.onload = function () { if (next) next(); };
      l.onerror = function () { if (next) next(); };
      document.getElementsByTagName('head')[0].appendChild(l);
    }

    function executeInit() {
      paint();
      setBar('Carregando dashboard…', 'info');
      loadCss(function () {
        loadWaf(function () {
          startBundle();
        });
      });
    }

    function boot() {
      if (typeof widget !== 'undefined' && widget) {
        if (widget.addEvent) widget.addEvent('onLoad', executeInit);
        if (widget.addEvent) widget.addEvent('onRefresh', executeInit);
        if (widget.body) executeInit();
        else window.setTimeout(boot, 80);
      } else if (document.body) {
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', executeInit);
        } else {
          executeInit();
        }
      } else {
        window.setTimeout(boot, 80);
      }
    }
    boot();
  //]]>
  </script>
</head>
<body></body>
</html>
