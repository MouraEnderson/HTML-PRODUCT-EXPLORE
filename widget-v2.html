<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>BOM Analytics v2</title>
  <style type="text/css">
    .bom-root { min-height: 420px; background: #f0f6fa; font-family: "Segoe UI", sans-serif; color: #1a2332; }
    .bom-ver { margin: 0; padding: 10px 12px; background: #1565c0; color: #fff; font-size: 13px; font-weight: bold; }
    .bom-h1 { margin: 0; padding: 10px 14px; background: #fff; border-bottom: 1px solid #dde3ea; font-size: 16px; color: #005686; }
    .bom-st { padding: 8px 14px; font-size: 13px; background: #e3f2fd; color: #0d47a1; }
    .bom-st-ok { background: #e8f5e9; color: #1b5e20; }
    .bom-st-err { background: #ffebee; color: #b71c1c; }
    .bom-panel { margin: 10px 14px; padding: 12px; background: #fff; border-radius: 8px; }
    .bom-btn { display: block; width: 100%; padding: 12px; margin-top: 10px; background: #2e7d32; color: #fff; border: 0; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; }
    .bom-btn:disabled { background: #9e9e9e; }
    .bom-paste-hint { margin: 0 0 6px; font-size: 13px; font-weight: bold; color: #0d47a1; }
    #pasteArea { display: block !important; width: 100%; min-height: 72px; padding: 10px; border: 4px solid #1976d2 !important; border-radius: 8px; background: #bbdefb !important; font-size: 12px; font-family: Consolas, monospace; box-sizing: border-box; }
    .bom-charts { padding: 8px 14px; }
    .bom-chart { display: inline-block; width: 48%; min-height: 100px; margin: 1%; background: #fff; border: 1px solid #dde3ea; }
    .bom-table-wrap { margin: 8px 14px; background: #fff; border: 1px solid #dde3ea; max-height: 180px; overflow: auto; }
    .bom-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .bom-table th, .bom-table td { border: 1px solid #e0e0e0; padding: 4px 6px; }
    .bom-hidden { display: none; }
    .bom-kpi { padding: 6px 14px; font-size: 13px; }
  </style>
  <script type="text/javascript">
  //<![CDATA[
    window.__3DX_TRUSTED_WIDGET__ = true;
    window.__3DX_BOOT_DEFER__ = true;

    var BOM_BUILD = 'bom20260530b';
    var GH = 'https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/';

    function uiRoot() {
      return window.__3DX_UI_ROOT__ || null;
    }

    function setBar(msg, kind) {
      var el = uiRoot() && uiRoot().querySelector('#statusBar');
      if (!el) return;
      el.innerHTML = msg;
      el.className = 'bom-st';
      if (kind === 'ok') el.className = 'bom-st bom-st-ok';
      if (kind === 'error') el.className = 'bom-st bom-st-err';
    }

    function paint() {
      if (!widget || !widget.body) return;
      var b = widget.body;
      b.innerHTML = '';
      b.className = 'bom-root';
      b.style.minHeight = '420px';

      var ver = document.createElement('p');
      ver.className = 'bom-ver';
      ver.textContent = 'BOM Analytics v2 — build ' + BOM_BUILD + ' — CAIXA AZUL ABAIXO';
      b.appendChild(ver);

      var h1 = document.createElement('div');
      h1.className = 'bom-h1';
      h1.innerHTML = 'Estrutura: <strong id="selectionLabel">-</strong>';
      b.appendChild(h1);

      var st = document.createElement('div');
      st.id = 'statusBar';
      st.className = 'bom-st';
      st.textContent = 'Cole a grade do Explorer na caixa azul.';
      b.appendChild(st);

      var panel = document.createElement('div');
      panel.className = 'bom-panel';

      var hint = document.createElement('p');
      hint.className = 'bom-paste-hint';
      hint.textContent = '1) Explorer: clique na grade → Ctrl+A → Ctrl+C   2) Cole aqui (Ctrl+V)   3) Varrer';
      panel.appendChild(hint);

      var ta = document.createElement('textarea');
      ta.id = 'pasteArea';
      ta.setAttribute('placeholder', 'CAIXA AZUL — cole Mont10, M1, M2…');
      panel.appendChild(ta);

      var btn = document.createElement('button');
      btn.type = 'button';
      btn.id = 'btnScanExplorer';
      btn.className = 'bom-btn';
      btn.textContent = 'Varrer estrutura Explorer';
      btn.onclick = function () { runScan(btn); };
      panel.appendChild(btn);

      b.appendChild(panel);

      var hidden = document.createElement('div');
      hidden.className = 'bom-hidden';
      hidden.innerHTML =
        '<input type="search" id="searchInput" />' +
        '<select id="filterMaturity"><option value="all">all</option></select>' +
        '<select id="filterType"><option value="all">all</option></select>' +
        '<select id="filterApproval"><option value="all">all</option></select>' +
        '<select id="filterPP"><option value="all">all</option></select>';
      b.appendChild(hidden);

      var kpi = document.createElement('div');
      kpi.id = 'kpiGrid';
      kpi.className = 'bom-kpi';
      b.appendChild(kpi);

      var charts = document.createElement('div');
      charts.className = 'bom-charts';
      charts.innerHTML =
        '<div class="bom-chart"><canvas id="chartMaturity"></canvas></div>' +
        '<div class="bom-chart"><canvas id="chartType"></canvas></div>' +
        '<div class="bom-chart"><canvas id="chartRevision"></canvas></div>' +
        '<div class="bom-chart"><canvas id="chartApproval"></canvas></div>';
      b.appendChild(charts);

      var tw = document.createElement('div');
      tw.className = 'bom-table-wrap';
      tw.innerHTML =
        '<div style="padding:8px;font-weight:bold">E-BOM — <span id="tableProductLabel">-</span></div>' +
        '<table id="bomTable" class="bom-table"><thead><tr></tr></thead><tbody></tbody></table>';
      b.appendChild(tw);

      window.__3DX_UI_ROOT__ = b;
    }

    /** Varredura mínima se o bundle ainda não carregou */
    function quickParse(text) {
      var lines = String(text || '').split(/\r?\n/).filter(function (l) { return l.trim(); });
      if (lines.length < 2) return null;
      var items = [];
      var start = 0;
      if (/t[ií]tulo|title|nome/i.test(lines[0])) start = 1;
      for (var i = start; i < lines.length; i++) {
        var cols = lines[i].indexOf('\t') >= 0 ? lines[i].split('\t') : lines[i].split(';');
        var name = (cols[0] || '').replace(/^\s+|\s+$/g, '');
        if (name.charAt(0) === '{') continue;
        if (/enderson|moura/i.test(name) && !/mont|^m\d+$/i.test(name)) continue;
        if (!name || /^physical\s*product$/i.test(name)) continue;
        var rev = cols[1] || '';
        var typ = cols[2] || 'Physical Product';
        var state = cols[4] || cols[5] || '';
        if (/aprovado/i.test(state)) state = 'Aprovado';
        items.push({
          level: items.length === 0 ? 0 : 1,
          name: name,
          title: name,
          type: typ,
          revision: rev,
          state: state,
          maturity: state,
          approval: /aprovado/i.test(state) ? 'Approved' : 'Unknown',
          quantity: 1,
          physicalid: 'IMP_' + items.length + '_' + name
        });
      }
      if (items.length < 2) return null;
      var hasMont = items.some(function (it) { return /mont/i.test(it.name); });
      if (!hasMont) return null;
      return items;
    }

    function quickRender(items) {
      var root = uiRoot();
      if (!root) return;
      var lbl = root.querySelector('#selectionLabel');
      var kpi = root.querySelector('#kpiGrid');
      var tbody = root.querySelector('#bomTable tbody');
      var thead = root.querySelector('#bomTable thead tr');
      var tl = root.querySelector('#tableProductLabel');
      var rootName = items[0].name;
      if (lbl) lbl.textContent = rootName;
      if (tl) tl.textContent = rootName;
      var appr = 0;
      items.forEach(function (it) {
        if (/aprovado/i.test(it.state || '')) appr++;
      });
      if (kpi) {
        kpi.innerHTML =
          '<div><strong>' + items.length + '</strong> Total de itens</div>' +
          '<div><strong>' + appr + '</strong> Aprovados</div>' +
          '<div><strong>' + items.length + '</strong> Physical Products</div>';
      }
      if (thead) {
        thead.innerHTML = '<th>Nome</th><th>Rev</th><th>Estado</th>';
      }
      if (tbody) {
        tbody.innerHTML = items.map(function (it) {
          return '<tr><td>' + it.name + '</td><td>' + it.revision + '</td><td>' + it.state + '</td></tr>';
        }).join('');
      }
    }

    function runScan(btn) {
      var area = uiRoot() && uiRoot().querySelector('#pasteArea');
      var text = area && area.value ? area.value.trim() : '';
      if (!text) {
        setBar('Cole na CAIXA AZUL (Ctrl+V) antes de Varrer.', 'error');
        return;
      }
      if (typeof App !== 'undefined' && App.runExplorerScan) {
        App.runExplorerScan(btn);
        return;
      }
      var items = quickParse(text);
      if (!items) {
        setBar('Texto inválido. Explorer: Ctrl+A na grade → Ctrl+C → cole na caixa azul.', 'error');
        return;
      }
      quickRender(items);
      setBar('Varredura concluída: ' + items.length + ' itens — ' + items[0].name + ' (modo rápido)', 'ok');
    }

    function loadScript(url, optional, next) {
      var s = document.createElement('script');
      s.type = 'text/javascript';
      s.charset = 'UTF-8';
      s.src = url;
      s.onload = function () { if (next) next(null); };
      s.onerror = function () { if (optional) { if (next) next(null); } else if (next) next('erro'); };
      document.getElementsByTagName('head')[0].appendChild(s);
    }

    function loadWaf(next) {
      if (typeof WAFData !== 'undefined' && WAFData.authenticatedRequest) {
        next(null);
        return;
      }
      var req = (widget && widget.requirejs) || (typeof require !== 'undefined' ? require : null);
      if (!req) {
        next(null);
        return;
      }
      req(
        ['DS/WAFData/WAFData', 'DS/i3DXCompassServices/i3DXCompassServices', 'DS/PlatformAPI/PlatformAPI'],
        function (WAF, Compass, PAPI) {
          window.WAFData = WAF;
          window.__3DX_COMPASS__ = Compass;
          window.__3DX_PLATFORM_API__ = PAPI;
          next(null);
        },
        function () { next(null); }
      );
    }

    function startBundle() {
      var ts = BOM_BUILD + '_' + Date.now();
      loadScript(GH + 'assets/vendor/chart.umd.min.js?v=' + ts, true, function () {
        loadScript(GH + 'assets/js/bom-bundle.js?v=' + ts, false, function (err) {
          if (err) {
            setBar('Bundle opcional falhou — use caixa azul + Varrer (modo rápido OK).', 'warn');
            return;
          }
          try {
            if (typeof detectRuntimeMode === 'function') detectRuntimeMode();
            if (typeof App !== 'undefined' && App.run) {
              App.run();
              setBar('Pronto — cole na caixa azul e clique Varrer.', 'ok');
            }
          } catch (ex) {
            setBar('Modo rápido ativo. Cole e Varrer.', 'warn');
          }
        });
      });
    }

    function executeInit() {
      paint();
      loadWaf(function () {
        startBundle();
      });
    }

    function widgetLoading() {
      if (widget) {
        widget.addEvent('onLoad', executeInit);
        if (widget.body) window.setTimeout(executeInit, 0);
      } else {
        window.setTimeout(widgetLoading, 100);
      }
    }
    widgetLoading();
  //]]>
  </script>
</head>
<body></body>
</html>
