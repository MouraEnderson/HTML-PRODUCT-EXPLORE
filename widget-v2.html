<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>BOM Analytics</title>
  <style type="text/css">
    html, body { margin: 0; padding: 0; min-height: 100%; background: #f0f6fa; font-family: "Segoe UI", sans-serif; }
    .bom-ver { margin: 0; padding: 10px 12px; background: #0d47a1; color: #fff; font-size: 13px; font-weight: bold; }
    .bom-h1 { margin: 0; padding: 10px 14px; background: #fff; font-size: 16px; color: #005686; }
    .bom-st { padding: 10px 14px; font-size: 13px; background: #e3f2fd; color: #0d47a1; }
    .bom-st-ok { background: #c8e6c9; color: #1b5e20; }
    .bom-st-err { background: #ffebee; color: #b71c1c; }
    .bom-panel { margin: 10px 14px; padding: 12px; background: #fff; border-radius: 8px; }
    .bom-btn { display: block; width: 100%; padding: 14px; background: #2e7d32; color: #fff; border: 0; font-size: 16px; font-weight: bold; cursor: pointer; }
    .bom-btn:disabled { background: #757575; }
    .bom-hint { margin: 0 0 10px; font-size: 13px; color: #1565c0; }
    .bom-fallback { margin-top: 12px; font-size: 12px; color: #666; }
    .bom-fallback textarea { width: 100%; height: 48px; margin-top: 6px; font-size: 11px; }
    .bom-charts { padding: 8px 14px; }
    .bom-chart { display: inline-block; width: 48%; min-height: 90px; margin: 1%; background: #fff; border: 1px solid #dde3ea; }
    .bom-table-wrap { margin: 8px 14px; background: #fff; border: 1px solid #dde3ea; max-height: 200px; overflow: auto; }
    .bom-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .bom-table th, .bom-table td { border: 1px solid #e0e0e0; padding: 4px 6px; }
    .bom-hidden { display: none; }
  </style>
  <script type="text/javascript">
  //<![CDATA[
    window.__3DX_TRUSTED_WIDGET__ = true;
    window.__3DX_BOOT_DEFER__ = true;

    var BOM_BUILD = 'bom20260601d';
    var GH = 'https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/';

    var UI_HTML =
      '<div class="bom-root">' +
      '<p class="bom-ver">BOM Analytics — Sprint 1 API — build ' + BOM_BUILD + '</p>' +
      '<div class="bom-h1">Estrutura: <strong id="selectionLabel">-</strong></div>' +
      '<div id="statusBar" class="bom-st">Carregando…</div>' +
      '<div class="bom-panel">' +
      '<p class="bom-hint">Explorer: selecione a <b>raiz</b> (1ª linha) → Varrer. Ou URL: ?structure=NomeRaiz</p>' +
      '<button type="button" id="btnScanExplorer" class="bom-btn">Varrer estrutura Explorer</button>' +
      '<details class="bom-fallback"><summary>Modo avançado (ID físico ou cola — não usar cola em produção)</summary>' +
      '<p style="margin:6px 0;font-size:12px;">Explorer → raiz Mont10 → Propriedades → <b>ID físico</b> (32 caracteres):</p>' +
      '<input type="text" id="explorerObjectId" placeholder="prd-R1132100929518-00511496" style="width:100%;padding:8px;font-size:12px;box-sizing:border-box;" />' +
      '<button type="button" id="btnLoadPhysicalId" class="bom-btn" style="margin-top:8px;background:#1565c0;">Varrer por ID físico</button>' +
      '<textarea id="pasteArea" placeholder="Cola da grade (só teste)"></textarea></details>' +
      '</div>' +
      '<div id="kpiGrid" style="padding:8px 14px;"></div>' +
      '<div class="bom-charts">' +
      '<div class="bom-chart"><canvas id="chartMaturity"></canvas></div>' +
      '<div class="bom-chart"><canvas id="chartType"></canvas></div>' +
      '<div class="bom-chart"><canvas id="chartRevision"></canvas></div>' +
      '<div class="bom-chart"><canvas id="chartApproval"></canvas></div></div>' +
      '<div class="bom-table-wrap"><div style="padding:8px;font-weight:bold;">E-BOM — <span id="tableProductLabel">-</span></div>' +
      '<table id="bomTable" class="bom-table"><thead><tr></tr></thead><tbody></tbody></table></div>' +
      '<div id="loadingOverlay" class="bom-hidden">Varrendo…</div>' +
      '<div class="bom-hidden" id="hiddenFields">' +
      '<input type="text" id="explorerObjectName" />' +
      '<input type="search" id="searchInput" />' +
      '<select id="filterMaturity"><option value="all">all</option></select>' +
      '<select id="filterType"><option value="all">all</option></select>' +
      '<select id="filterApproval"><option value="all">all</option></select>' +
      '<select id="filterPP"><option value="all">all</option></select>' +
      '</div></div>';

    function mountTarget() {
      if (typeof widget !== 'undefined' && widget && widget.body) return widget.body;
      return document.body;
    }

    function uiRoot() {
      return window.__3DX_UI_ROOT__ || mountTarget();
    }

    function setBar(msg, kind) {
      var el = uiRoot() && uiRoot().querySelector('#statusBar');
      if (!el) return;
      el.textContent = msg;
      el.className = 'bom-st';
      if (kind === 'ok') el.className = 'bom-st bom-st-ok';
      if (kind === 'error') el.className = 'bom-st bom-st-err';
    }

    function paint() {
      var b = mountTarget();
      if (!b) return;
      b.innerHTML = UI_HTML;
      b.style.minHeight = '420px';
      window.__3DX_UI_ROOT__ = b;
    }

    function getRequire() {
      if (typeof widget !== 'undefined' && widget && widget.requirejs) return widget.requirejs;
      if (typeof require !== 'undefined') return require;
      return null;
    }

    function loadScript(url, optional, next) {
      var s = document.createElement('script');
      s.type = 'text/javascript';
      s.charset = 'UTF-8';
      s.src = url;
      s.onload = function () { if (next) next(null); };
      s.onerror = function () { if (optional) { if (next) next(null); } else if (next) next('erro'); };
      document.getElementsByTagName('head')[0].appendChild(s);
    }

    function loadWaf(next) {
      if (typeof WAFData !== 'undefined' && WAFData.authenticatedRequest) {
        next(null);
        return;
      }
      var req = getRequire();
      if (!req) {
        next(null);
        return;
      }
      req(
        ['DS/WAFData/WAFData', 'DS/i3DXCompassServices/i3DXCompassServices', 'DS/PlatformAPI/PlatformAPI'],
        function (WAF, Compass, PAPI) {
          window.WAFData = WAF;
          window.__3DX_COMPASS__ = Compass;
          window.__3DX_PLATFORM_API__ = PAPI;
          next(null);
        },
        function () { next(null); }
      );
    }

    function startBundle() {
      loadScript(GH + 'assets/vendor/chart.umd.min.js?v=' + BOM_BUILD, true, function () {
        loadScript(GH + 'assets/js/bom-bundle.js?v=' + BOM_BUILD, false, function (err) {
          if (err) {
            setBar('Erro ao carregar bundle. Verifique GitHub Pages.', 'error');
            return;
          }
          try {
            if (typeof detectRuntimeMode === 'function') detectRuntimeMode();
            if (typeof App !== 'undefined' && App.run) {
              App.run();
              setBar('Pronto — selecione a raiz no Explorer e clique Varrer.', 'ok');
            } else {
              setBar('App não iniciou. Ver Console (F12).', 'error');
            }
          } catch (ex) {
            setBar('Erro: ' + (ex.message || ex), 'error');
          }
        });
      });
    }

    function executeInit() {
      paint();
      setBar('Carregando WAFData e API…', 'info');
      loadWaf(function () {
        startBundle();
      });
    }

    function boot() {
      if (typeof widget !== 'undefined' && widget) {
        if (widget.addEvent) widget.addEvent('onLoad', executeInit);
        if (widget.addEvent) widget.addEvent('onRefresh', executeInit);
        if (widget.body) executeInit();
        else window.setTimeout(boot, 80);
      } else if (document.body) {
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', executeInit);
        } else {
          executeInit();
        }
      } else {
        window.setTimeout(boot, 80);
      }
    }
    boot();
  //]]>
  </script>
</head>
<body></body>
</html>
