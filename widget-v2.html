<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>BOM Analytics</title>
  <style type="text/css">
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Segoe UI", sans-serif; }
    .bom-hidden { display: none !important; }
  </style>
  <script type="text/javascript">
  //<![CDATA[
    window.__3DX_TRUSTED_WIDGET__ = true;
    window.__3DX_BOOT_DEFER__ = true;

    var BOM_BUILD = 'bom20260603c';
    var GH = 'https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/';
    var BUNDLE;

    (function parseEmbedEarly() {
      function pq(s) {
        var q = {}, x = String(s || '').replace(/^\?/, '');
        if (!x) return q;
        x.split('&').forEach(function (p) {
          var a = p.split('=');
          if (a[0]) q[decodeURIComponent(a[0])] = decodeURIComponent(a[1] || '');
        });
        return q;
      }
      function fromUrl(url, out) {
        if (!url) return out;
        var u = String(url), i = u.indexOf('?');
        if (i >= 0) { var q = pq(u.slice(i)); for (var k in q) if (q[k]) out[k] = q[k]; }
        var m = u.match(/[?&]uwaUrl=([^&]+)/i);
        if (m && m[1]) try { fromUrl(decodeURIComponent(m[1]), out); } catch (e) {}
        return out;
      }
      var eq = {};
      fromUrl(location.href, eq);
      fromUrl(location.search, eq);
      try { if (frameElement && frameElement.src) fromUrl(frameElement.src, eq); } catch (e) {}
      window.__3DX_EMBED_QUERY__ = eq;
    })();

    (function applyBuildFromQuery() {
      var eq = window.__3DX_EMBED_QUERY__ || {};
      if (eq.v && /^bom20/.test(eq.v)) BOM_BUILD = eq.v;
      else if (eq.build && /^bom20/.test(eq.build)) BOM_BUILD = eq.build;
      BUNDLE = GH + 'assets/js/bom-bundle-' + BOM_BUILD + '.js';
    })();

    var UI_HTML =
      '<div class="bom-root bom-dashboard bom-theme-gray ui-clean bom-layout-ref bom-layout-topbar">' +
      '<header class="bom-topbar">' +
      '<div class="bom-topbar-left">' +
      '<span class="bom-topbar-brand">BOM Analytics</span>' +
      '<span class="bom-topbar-product" id="selectionLabel" title="-">-</span>' +
      '</div>' +
      '<div class="bom-topbar-actions">' +
      '<button type="button" id="btnImportPaste" class="bom-btn bom-btn-primary">Atualizar estrutura</button>' +
      '<span class="bom-topbar-clock" title="Última atualização">' +
      '<span id="lastUpdateClock" class="bom-clock-time">--:--:--</span></span>' +
      '<button type="button" id="btnThemeToggle" class="bom-btn bom-btn-secondary bom-btn-compact">Tema</button>' +
      '<details class="bom-topbar-more">' +
      '<summary>Avançado</summary>' +
      '<div id="bomRulesPanel"></div>' +
      '<input type="text" id="explorerObjectId" class="bom-input" placeholder="ID físico" />' +
      '<button type="button" id="btnLoadPhysicalId" class="bom-btn bom-btn-secondary">Varrer por ID</button>' +
      '<textarea id="pasteArea" class="bom-paste" placeholder="Colar grade Explorer (Ctrl+V)"></textarea>' +
      '</details>' +
      '</div></header>' +
      '<div id="syncBanner" class="bom-sync-banner bom-sync-info">' +
      'Abra a estrutura no Explorer e clique <strong>Atualizar estrutura</strong>.</div>' +
      '<main class="bom-main bom-workspace">' +
      '<section class="bom-work-main">' +
      '<section class="bom-ebom-block">' +
      '<div class="bom-ebom-head">' +
      '<h2>E-BOM — <span id="tableProductLabel" title="-">-</span></h2>' +
      '<p id="ebomMeta" class="bom-ebom-meta">Clique numa linha para ver detalhes no painel lateral.</p>' +
      '</div>' +
      '<div class="bom-ebom-list">' +
      '<div class="bom-table-wrap table-scroll">' +
      '<table id="bomTable" class="bom-table"><thead><tr></tr></thead><tbody></tbody></table>' +
      '</div>' +
      '<footer id="tablePager" class="bom-table-pager">0 peças</footer>' +
      '</div></section></section>' +
      '<aside class="bom-work-side">' +
      '<section id="kpiGrid" class="stat-markers-row stat-markers-compact stat-markers-side" aria-label="Estatísticas"></section>' +
      '<details class="bom-side-panel bom-filters-panel" id="filtersPanel" open>' +
      '<summary>Filtros e busca</summary>' +
      '<div class="bom-filter-bar bom-filter-bar-side">' +
      '<label class="bom-filter-item"><span>Maturidade</span>' +
      '<select id="filterMaturity"><option value="all">Todas</option>' +
      '<option value="released">Bom (Aprovado)</option><option value="in_work">Moderado</option>' +
      '<option value="obsolete">Ruim</option><option value="other">Outros</option></select></label>' +
      '<label class="bom-filter-item"><span>Tipo</span><select id="filterType"><option value="all">Todos</option></select></label>' +
      '<label class="bom-filter-item"><span>Aprovação</span>' +
      '<select id="filterApproval"><option value="all">Todas</option>' +
      '<option value="approved">Aprovado</option><option value="pending">Pendente</option></select></label>' +
      '<label class="bom-filter-item bom-filter-grow"><span>Buscar</span>' +
      '<input type="search" id="searchInput" placeholder="Nome, descrição, proprietário…" /></label>' +
      '<button type="button" id="btnClearFilters" class="bom-btn bom-btn-filter-clear">Limpar</button>' +
      '</div></details>' +
      '<div id="statusBar" class="bom-st bom-st-inline bom-st-side">Carregando…</div>' +
      '<details class="bom-charts-collapsible bom-side-panel" id="chartsSection">' +
      '<summary>Gráficos — maturidade e proprietários</summary>' +
      '<section class="bom-charts-row bom-charts-row-side">' +
      '<div class="bom-chart-panel"><canvas id="chartMaturity"></canvas></div>' +
      '<div class="bom-chart-panel bom-chart-owners">' +
      '<canvas id="chartOwners"></canvas>' +
      '<div id="ownersLegendScroll" class="owners-legend-scroll" aria-label="Lista de proprietários"></div></div>' +
      '<canvas id="chartType" class="bom-hidden"></canvas>' +
      '<canvas id="chartRevision" class="bom-hidden"></canvas>' +
      '<canvas id="chartApproval" class="bom-hidden"></canvas>' +
      '</section></details>' +
      '<details class="bom-part-preview bom-side-panel" id="partPreviewPanel" open>' +
      '<summary class="bom-preview-summary">' +
      '<span id="partPreviewTitle" class="bom-preview-title">Visualização da peça</span></summary>' +
      '<div class="bom-preview-body">' +
      '<p class="bom-preview-hint">Clique numa linha da estrutura</p>' +
      '<div id="partPreviewImage" class="bom-preview-image">' +
      '<span class="bom-preview-placeholder">Preview 2D · 3DPlay em breve</span></div>' +
      '<div id="partPreviewMeta" class="bom-preview-meta"></div>' +
      '</div></details></aside></main>' +
      '<button type="button" id="btnScanExplorer" class="bom-hidden">Varrer</button>' +
      '<div id="loadingOverlay" class="bom-loading bom-hidden">Processando…</div>' +
      '<span class="bom-build-tag bom-hidden" id="buildTag">' + BOM_BUILD + '</span>' +
      '<div class="bom-hidden" id="hiddenFields">' +
      '<input type="text" id="explorerObjectName" />' +
      '<select id="filterPP"><option value="all">all</option></select>' +
      '</div></div>';

    function mountTarget() {
      if (typeof widget !== 'undefined' && widget && widget.body) return widget.body;
      return document.body;
    }

    function uiRoot() {
      return window.__3DX_UI_ROOT__ || mountTarget();
    }

    function setBar(msg, kind) {
      var el = uiRoot() && uiRoot().querySelector('#statusBar');
      if (!el) return;
      el.textContent = msg;
      el.className = 'bom-st bom-st-inline';
      if (kind === 'ok') el.className += ' bom-st-ok';
      if (kind === 'error') el.className += ' bom-st-err';
    }

    function paint() {
      var b = mountTarget();
      if (!b) return;
      b.innerHTML = UI_HTML;
      b.className = 'bom-widget-body';
      b.style.minHeight = '100%';
      b.style.height = '100%';
      window.__3DX_UI_ROOT__ = b;
    }

    function getRequire() {
      if (typeof widget !== 'undefined' && widget && widget.requirejs) return widget.requirejs;
      if (typeof require !== 'undefined') return require;
      return null;
    }

    function loadScript(url, optional, next) {
      var s = document.createElement('script');
      s.type = 'text/javascript';
      s.charset = 'UTF-8';
      s.src = url;
      s.onload = function () { if (next) next(null); };
      s.onerror = function () { if (optional) { if (next) next(null); } else if (next) next('erro'); };
      document.getElementsByTagName('head')[0].appendChild(s);
    }

    function loadWaf(next) {
      if (typeof WAFData !== 'undefined' && WAFData.authenticatedRequest) {
        next(null);
        return;
      }
      var req = getRequire();
      if (!req) { next(null); return; }
      req(
        ['DS/WAFData/WAFData', 'DS/i3DXCompassServices/i3DXCompassServices', 'DS/PlatformAPI/PlatformAPI'],
        function (WAF, Compass, PAPI) {
          window.WAFData = WAF;
          window.__3DX_COMPASS__ = Compass;
          window.__3DX_PLATFORM_API__ = PAPI;
          next(null);
        },
        function () { next(null); }
      );
    }

    function startBundle() {
      loadScript(GH + 'assets/vendor/chart.umd.min.js?v=' + BOM_BUILD, true, function () {
        loadScript(BUNDLE, false, function (err) {
          if (err) {
            setBar('Erro ao carregar bundle.', 'error');
            return;
          }
          try {
            if (typeof detectRuntimeMode === 'function') detectRuntimeMode();
            if (typeof App !== 'undefined' && App.run) {
              App.run();
              if (App.rebindScanButton) App.rebindScanButton();
              if (App.rebindImportButton) App.rebindImportButton();
            } else {
              setBar('App não iniciou.', 'error');
            }
          } catch (ex) {
            setBar('Erro: ' + (ex.message || ex), 'error');
          }
        });
      });
    }

    function loadCss(next) {
      var l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = GH + 'assets/css/dashboard.css?v=' + BOM_BUILD;
      l.onload = function () { if (next) next(); };
      l.onerror = function () { if (next) next(); };
      document.getElementsByTagName('head')[0].appendChild(l);
    }

    function executeInit() {
      paint();
      setBar('Carregando dashboard…', 'info');
      loadCss(function () {
        loadWaf(function () { startBundle(); });
      });
    }

    function boot() {
      if (typeof widget !== 'undefined' && widget) {
        if (widget.addEvent) widget.addEvent('onLoad', executeInit);
        if (widget.addEvent) widget.addEvent('onRefresh', executeInit);
        if (widget.body) executeInit();
        else window.setTimeout(boot, 80);
      } else if (document.body) {
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', executeInit);
        } else {
          executeInit();
        }
      } else {
        window.setTimeout(boot, 80);
      }
    }
    boot();
  //]]>
  </script>
</head>
<body></body>
</html>
