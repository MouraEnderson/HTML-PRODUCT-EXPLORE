  //<![CDATA[
    function bomMountAndRun() {
      var tpl = document.getElementById('bom-app-template');
      if (!tpl || !widget.body) {
        return;
      }
      widget.body.innerHTML = tpl.innerHTML;
      widget.body.className = 'ui-explorer-only';
      window.__3DX_TRUSTED_WIDGET__ = true;
      if (typeof WidgetRuntime !== 'undefined') {
        WidgetRuntime.markTrusted();
      }
      if (typeof App !== 'undefined' && App.run) {
        App.run();
        return;
      }
      var bar = widget.body.querySelector('#statusBar');
      var missing = [];
      if (typeof APP_CONFIG === 'undefined') missing.push('config.js');
      if (typeof BomService === 'undefined') missing.push('bom-service.js');
      if (typeof App === 'undefined') missing.push('app.js');
      var msg = 'Erro ao carregar scripts';
      if (missing.length) msg += ' (' + missing.join(', ') + ')';
      msg += '. Tenant pode bloquear github.io — veja DEPLOY-3DSPACE.md.';
      if (bar) bar.textContent = msg;
    }

    if (typeof widget !== 'undefined' && widget.addEvent) {
      widget.addEvent('onLoad', bomMountAndRun);
      widget.addEvent('onRefresh', function () {
        if (typeof App !== 'undefined' && App.reloadFromExplorer) {
          App.reloadFromExplorer();
        }
      });
    }
  //]]>

<div id="bom-app-template" style="display:none">
  <header class="app-header explorer-header">
    <h1>BOM Analytics</h1>
    <p class="explorer-product">Product Structure Explorer: <strong id="selectionLabel">—</strong></p>
    <button type="button" class="ui-hidden" id="btnSyncExplorer">sync</button>
    <button type="button" class="ui-hidden" id="btnRefresh">refresh</button>
  </header>
  <div id="statusBar" class="status-bar">Preparando… v20260529</div>
  <div class="ui-hidden" aria-hidden="true">
    <input type="text" id="explorerObjectId" />
    <input type="text" id="explorerObjectName" />
    <button id="btnLoadObjectId"></button>
    <select id="filterMaturity"><option value="all">all</option></select>
    <select id="filterType"><option value="all">all</option></select>
    <select id="filterApproval"><option value="all">all</option></select>
    <select id="filterPP"><option value="all">all</option></select>
  </div>
  <main class="dashboard-explorer">
    <section id="kpiGrid" class="kpi-grid kpi-compact"></section>
    <section class="charts-grid charts-main">
      <div class="chart-card"><canvas id="chartMaturity"></canvas></div>
      <div class="chart-card"><canvas id="chartType"></canvas></div>
      <div class="chart-card"><canvas id="chartRevision"></canvas></div>
      <div class="chart-card"><canvas id="chartApproval"></canvas></div>
    </section>
    <section class="panel table-panel">
      <div class="panel-header">E-BOM — <span id="tableProductLabel">—</span></div>
      <div class="filter-row"><input type="search" id="searchInput" placeholder="Filtrar tabela…" /></div>
      <div class="table-scroll table-scroll-wide">
        <table id="bomTable" class="data-table"><thead><tr></tr></thead><tbody></tbody></table>
      </div>
    </section>
  </main>
  <div id="loadingOverlay" class="loading-overlay hidden">Carregando E-BOM…</div>
</div>
