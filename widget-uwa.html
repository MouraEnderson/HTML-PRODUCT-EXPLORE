<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
  <title>BOM Analytics</title>
  <link rel="stylesheet" type="text/css" href="https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/assets/css/dashboard.css?v=ghpages" />
  <script type="text/javascript">window.__3DX_TRUSTED_WIDGET__=true;window.__3DX_BOOT_DEFER__=true;</script>
  <script type="text/javascript" src="https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/assets/vendor/chart.umd.min.js"></script>
  <script type="text/javascript" src="https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/assets/js/bom-bundle.js?v=sync20260530"></script>
  <script type="text/javascript">
  //<![CDATA[
    function bomMount() {
      var tpl = document.getElementById('bom-app-template');
      if (!tpl || !widget || !widget.body) return;
      widget.body.innerHTML = tpl.innerHTML;
      widget.body.className = 'ui-explorer-only';
      window.__3DX_TRUSTED_WIDGET__ = true;
      window.__3DX_BOOT_DEFER__ = true;
    }

    function bomStartApp() {
      var bar = widget.body.querySelector('#statusBar');
      if (typeof App === 'undefined') {
        if (bar) bar.textContent = 'Bundle não carregou — aguarde 1 min e Ctrl+F5';
        return;
      }
      try { App.run(); } catch (e) {
        if (bar) bar.textContent = 'Erro: ' + (e.message || e);
      }
    }

    function bomOnLoad() {
      bomMount();
      if (typeof require !== 'undefined') {
        require(['DS/WAFData/WAFData', 'DS/i3DXCompassServices/i3DXCompassServices', 'DS/PlatformAPI/PlatformAPI'],
          function (WAF, Compass, PlatformAPI) {
            window.WAFData = WAF;
            window.__3DX_COMPASS__ = Compass;
            window.__3DX_PLATFORM_API__ = PlatformAPI;
            bomStartApp();
          },
          function () { bomStartApp(); }
        );
      } else {
        bomStartApp();
      }
    }
    if (typeof widget !== 'undefined' && widget.addEvent) {
      widget.addEvent('onLoad', bomOnLoad);
      widget.addEvent('onRefresh', function () {
        if (typeof App !== 'undefined' && App.reloadFromExplorer) App.reloadFromExplorer();
      });
    }
  //]]>
  </script>
</head>
<body>
<div id="bom-app-template" style="display:none">
  <header class="app-header explorer-header">
    <h1>BOM Analytics</h1>
    <p class="explorer-product">Product Structure Explorer: <strong id="selectionLabel">—</strong></p>
    <button type="button" class="btn-sync-explorer" id="btnSyncExplorer" title="Ler produto aberto no Explorer">↻ Sincronizar Explorer</button>
    <button type="button" class="ui-hidden" id="btnRefresh">refresh</button>
  </header>
  <div id="statusBar" class="status-bar">Preparando… sync20260530</div>
  <div class="ui-hidden" aria-hidden="true">
    <input type="text" id="explorerObjectId" />
    <input type="text" id="explorerObjectName" />
    <button id="btnLoadObjectId"></button>
    <select id="filterMaturity"><option value="all">all</option></select>
    <select id="filterType"><option value="all">all</option></select>
    <select id="filterApproval"><option value="all">all</option></select>
    <select id="filterPP"><option value="all">all</option></select>
  </div>
  <main class="dashboard-explorer">
    <section id="kpiGrid" class="kpi-grid kpi-compact"></section>
    <section class="charts-grid charts-main">
      <div class="chart-card"><canvas id="chartMaturity"></canvas></div>
      <div class="chart-card"><canvas id="chartType"></canvas></div>
      <div class="chart-card"><canvas id="chartRevision"></canvas></div>
      <div class="chart-card"><canvas id="chartApproval"></canvas></div>
    </section>
    <section class="panel table-panel">
      <div class="panel-header">E-BOM — <span id="tableProductLabel">—</span></div>
      <div class="filter-row"><input type="search" id="searchInput" placeholder="Filtrar tabela…" /></div>
      <div class="table-scroll table-scroll-wide">
        <table id="bomTable" class="data-table"><thead><tr></tr></thead><tbody></tbody></table>
      </div>
    </section>
  </main>
  <div id="loadingOverlay" class="loading-overlay hidden">Carregando E-BOM…</div>
</div>
</body>
</html>
