<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
  <title>BOM Analytics</title>
  <link rel="stylesheet" type="text/css" href="https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/assets/css/dashboard.css?v=snapshot2b" />
  <script type="text/javascript">window.__3DX_TRUSTED_WIDGET__=true;window.__3DX_BOOT_DEFER__=true;</script>
  <script type="text/javascript" src="https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/assets/vendor/chart.umd.min.js"></script>
  <script type="text/javascript" src="https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/assets/js/bom-bundle.js?v=snapshot20260601b"></script>
  <script type="text/javascript">
  //<![CDATA[
    var __bomMounted = false;

    function bomGetMountTarget() {
      try {
        if (typeof widget !== 'undefined' && widget && widget.body) return widget.body;
      } catch (e1) { /* */ }
      return document.body;
    }

    function bomMount() {
      if (__bomMounted) return true;
      var tpl = document.getElementById('bom-app-template');
      if (!tpl) return false;
      var target = bomGetMountTarget();
      if (!target) return false;
      if (target.querySelector && target.querySelector('#statusBar')) {
        __bomMounted = true;
        return true;
      }
      target.innerHTML = tpl.innerHTML;
      target.className = 'ui-explorer-only';
      __bomMounted = true;
      return true;
    }

    function bomStartApp() {
      if (!bomMount()) return;
      var bar = bomGetMountTarget().querySelector('#statusBar');
      if (typeof App === 'undefined') {
        if (bar) bar.textContent = 'Aguarde bundle… ou Ctrl+F5 (v snapshot2b)';
        return;
      }
      try {
        App.run();
      } catch (e) {
        if (bar) bar.textContent = 'Erro: ' + (e.message || e);
      }
    }

    function bomOnLoad() {
      bomMount();
      if (typeof require !== 'undefined') {
        require(
          ['DS/WAFData/WAFData', 'DS/i3DXCompassServices/i3DXCompassServices', 'DS/PlatformAPI/PlatformAPI'],
          function (WAF, Compass, PlatformAPI) {
            window.WAFData = WAF;
            window.__3DX_COMPASS__ = Compass;
            window.__3DX_PLATFORM_API__ = PlatformAPI;
            bomStartApp();
          },
          function () { bomStartApp(); }
        );
      } else {
        bomStartApp();
      }
    }

    function bomScheduleBoot() {
      bomOnLoad();
      window.setTimeout(bomOnLoad, 80);
      window.setTimeout(bomOnLoad, 400);
      window.setTimeout(bomOnLoad, 1200);
    }

    if (typeof widget !== 'undefined' && widget.addEvent) {
      widget.addEvent('onLoad', bomScheduleBoot);
      widget.addEvent('onRefresh', function () {
        if (typeof App !== 'undefined' && App.reloadFromExplorer) App.reloadFromExplorer();
      });
    }
    if (document.addEventListener) {
      document.addEventListener('DOMContentLoaded', bomScheduleBoot);
    }
    bomScheduleBoot();
  //]]>
  </script>
</head>
<body class="ui-explorer-only">
  <div id="bom-boot-fallback" style="padding:8px;font-family:sans-serif;font-size:12px;color:#005686;">
    Carregando BOM Analytics…
  </div>
  <div id="bom-app-template" style="display:none">
  <header class="app-header explorer-header">
    <h1>BOM Analytics</h1>
    <p class="explorer-product">Product Structure Explorer: <strong id="selectionLabel">—</strong></p>
    <button type="button" class="ui-hidden" id="btnSyncExplorer">↻</button>
    <button type="button" class="ui-hidden" id="btnRefresh">refresh</button>
  </header>
  <div id="statusBar" class="status-bar">Preparando… cole estrutura do Explorer</div>
  <section class="snapshot-panel" id="snapshotPanel">
    <p class="snapshot-hint"><strong>1.</strong> Explorer Mont10 → selecione linhas → <strong>Ctrl+C</strong></p>
    <textarea id="pasteArea" class="paste-area" rows="4" placeholder="Cole aqui (Ctrl+V)…"></textarea>
    <div class="snapshot-actions">
      <button type="button" id="btnImportPaste" class="btn-primary">Importar estrutura</button>
      <button type="button" id="btnLoadSnapshotFile">Arquivo .json</button>
      <input type="file" id="snapshotFileInput" accept=".json,application/json" class="ui-hidden" />
      <a class="snapshot-link" href="https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/collect.html" target="_blank" rel="noopener">Coletor JSON</a>
    </div>
  </section>
  <div class="ui-hidden" aria-hidden="true">
    <input type="text" id="explorerObjectId" />
    <input type="text" id="explorerObjectName" />
    <button type="button" id="btnLoadObjectId"></button>
    <select id="filterMaturity"><option value="all">all</option></select>
    <select id="filterType"><option value="all">all</option></select>
    <select id="filterApproval"><option value="all">all</option></select>
    <select id="filterPP"><option value="all">all</option></select>
  </div>
  <main class="dashboard-explorer">
    <section id="kpiGrid" class="kpi-grid kpi-compact"></section>
    <section class="charts-grid charts-main">
      <div class="chart-card"><canvas id="chartMaturity"></canvas></div>
      <div class="chart-card"><canvas id="chartType"></canvas></div>
      <div class="chart-card"><canvas id="chartRevision"></canvas></div>
      <div class="chart-card"><canvas id="chartApproval"></canvas></div>
    </section>
    <section class="panel table-panel">
      <div class="panel-header">E-BOM — <span id="tableProductLabel">—</span></div>
      <div class="filter-row"><input type="search" id="searchInput" placeholder="Filtrar tabela…" /></div>
      <div class="table-scroll table-scroll-wide">
        <table id="bomTable" class="data-table"><thead><tr></tr></thead><tbody></tbody></table>
      </div>
    </section>
  </main>
  <div id="loadingOverlay" class="loading-overlay hidden">Carregando…</div>
  </div>
</body>
</html>
