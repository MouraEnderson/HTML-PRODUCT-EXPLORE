<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>BOM Analytics</title>
  <link rel="stylesheet" href="https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/assets/css/dashboard.css?v=scan2" />
  <style type="text/css">
    html, body { margin: 0; padding: 0; min-height: 420px; background: #f0f6fa; font-family: "Segoe UI", sans-serif; }
    #boot-msg { padding: 12px; color: #005686; font-size: 13px; }
  </style>
  <script type="text/javascript">window.__3DX_TRUSTED_WIDGET__ = true; window.__3DX_BOOT_DEFER__ = true;</script>
</head>
<body>
  <div id="boot-msg">BOM Analytics — aguardando widget UWA…</div>

  <div id="app-root" style="display:none">
    <header class="app-header explorer-header">
      <h1>BOM Analytics</h1>
      <p class="explorer-product">Estrutura: <strong id="selectionLabel">—</strong></p>
    </header>
    <div id="statusBar" class="status-bar status-warn">Iniciando…</div>
    <section class="snapshot-panel snapshot-panel-focus">
      <button type="button" id="btnScanExplorer" class="btn-scan-main">Varrer estrutura Explorer</button>
      <p class="snapshot-steps">① Grade Explorer (Mont10, M1, M2) → ② <strong>Ctrl+C</strong> → ③ <strong>Varrer</strong></p>
      <textarea id="pasteArea" class="paste-area" rows="3" placeholder="Ou cole aqui (Ctrl+V)…"></textarea>
      <div class="snapshot-actions">
        <button type="button" id="btnImportPaste" class="btn-primary">Importar cola</button>
        <button type="button" id="btnLoadExample" class="btn-secondary">Teste 3 itens</button>
        <input type="file" id="snapshotFileInput" accept=".json" class="ui-hidden" />
        <button type="button" id="btnLoadSnapshotFile" class="btn-secondary">JSON</button>
      </div>
    </section>
    <div class="ui-hidden" aria-hidden="true">
      <button type="button" id="btnSyncExplorer"></button>
      <button type="button" id="btnRefresh"></button>
      <input type="text" id="explorerObjectId" />
      <input type="text" id="explorerObjectName" />
      <button type="button" id="btnLoadObjectId"></button>
      <select id="filterMaturity"><option value="all">all</option></select>
      <select id="filterType"><option value="all">all</option></select>
      <select id="filterApproval"><option value="all">all</option></select>
      <select id="filterPP"><option value="all">all</option></select>
    </div>
    <main class="dashboard-explorer">
      <section id="kpiGrid" class="kpi-grid kpi-compact"></section>
      <section class="charts-grid charts-main">
        <div class="chart-card"><canvas id="chartMaturity"></canvas></div>
        <div class="chart-card"><canvas id="chartType"></canvas></div>
        <div class="chart-card"><canvas id="chartRevision"></canvas></div>
        <div class="chart-card"><canvas id="chartApproval"></canvas></div>
      </section>
      <section class="panel table-panel">
        <div class="panel-header">E-BOM — <span id="tableProductLabel">—</span></div>
        <div class="filter-row"><input type="search" id="searchInput" placeholder="Filtrar…" /></div>
        <div class="table-scroll table-scroll-wide">
          <table id="bomTable" class="data-table"><thead><tr></tr></thead><tbody></tbody></table>
        </div>
      </section>
    </main>
    <div id="loadingOverlay" class="loading-overlay hidden">Varrendo…</div>
  </div>

  <script type="text/javascript" src="https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/assets/vendor/chart.umd.min.js"></script>
  <script type="text/javascript" src="https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/assets/js/bom-bundle.js?v=trustedapi20260602b"></script>
  <script type="text/javascript">
  (function () {
    var mounted = false;

    function mountTarget() {
      try {
        if (typeof widget !== 'undefined' && widget && widget.body) return widget.body;
      } catch (e1) { /* */ }
      return document.body;
    }

    function mountApp() {
      if (mounted) return true;
      var root = document.getElementById('app-root');
      var target = mountTarget();
      if (!root || !target) return false;
      target.innerHTML = root.innerHTML;
      target.className = 'ui-explorer-only';
      target.style.minHeight = '420px';
      target.style.background = '#f0f6fa';
      mounted = true;
      var boot = document.getElementById('boot-msg');
      if (boot) boot.style.display = 'none';
      return true;
    }

    function startApp() {
      if (!mountApp()) return;
      var bar = mountTarget().querySelector('#statusBar');
      if (typeof App === 'undefined') {
        if (bar) bar.textContent = 'Erro: bundle não carregou. Abra menu widget → Atualizar.';
        return;
      }
      try {
        if (typeof detectRuntimeMode === 'function') detectRuntimeMode();
        App.run();
      } catch (err) {
        if (bar) bar.textContent = 'Erro: ' + (err.message || err);
      }
    }

    function onReady() {
      mountApp();
      if (typeof require !== 'undefined') {
        require(
          ['DS/WAFData/WAFData', 'DS/i3DXCompassServices/i3DXCompassServices', 'DS/PlatformAPI/PlatformAPI'],
          function (WAF, Compass, PAPI) {
            window.WAFData = WAF;
            window.__3DX_COMPASS__ = Compass;
            window.__3DX_PLATFORM_API__ = PAPI;
            startApp();
          },
          function () { startApp(); }
        );
      } else {
        startApp();
      }
    }

    function waitWidget() {
      mountApp();
      if (typeof widget !== 'undefined' && widget) {
        try {
          if (widget.addEvent) {
            widget.addEvent('onLoad', onReady);
            widget.addEvent('onRefresh', function () {
              if (typeof App !== 'undefined' && App.runExplorerScan) {
                var b = mountTarget().querySelector('#btnScanExplorer');
                App.runExplorerScan(b);
              }
            });
          }
        } catch (e2) { /* */ }
        onReady();
        return;
      }
      setTimeout(waitWidget, 100);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', waitWidget);
    } else {
      waitWidget();
    }
    setTimeout(function () {
      if (!mounted) {
        var boot = document.getElementById('boot-msg');
        if (boot) boot.textContent = 'Widget UWA não injetou — verifique URL widget-uwa.html (com uwa).';
      }
    }, 8000);
  })();
  </script>
</body>
</html>
