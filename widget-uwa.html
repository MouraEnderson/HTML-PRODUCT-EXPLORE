<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta charset="UTF-8" />
  <title>BOM Analytics</title>
  <!-- Script PRIMEIRO (padrão widget-min que funcionou no 3DDashboard) -->
  <script type="text/javascript">
  //<![CDATA[
    window.__3DX_TRUSTED_WIDGET__ = true;
    window.__3DX_BOOT_DEFER__ = true;

    var GH = 'https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/';
    var VER = 'uwa20260603f';

    var UI_HTML =
      '<div style="min-height:400px;background:#f0f6fa;font-family:Segoe UI,sans-serif;color:#1a2332;">' +
      '<p id="envHint" style="margin:0;padding:8px 12px;background:#e8f5e9;color:#1b5e20;font-size:12px;">BOM Analytics — 3DDashboard</p>' +
      '<div style="padding:10px 14px;background:#fff;border-bottom:1px solid #dde3ea;">' +
      '<h1 style="margin:0;font-size:16px;color:#005686;">BOM Analytics</h1>' +
      '<p style="margin:4px 0 0;font-size:13px;color:#5c6b7a;">Estrutura: <strong id="selectionLabel">—</strong></p></div>' +
      '<div id="statusBar" style="padding:8px 14px;background:#e3f2fd;color:#0d47a1;font-size:13px;">Iniciando…</div>' +
      '<div style="margin:10px 14px;padding:12px;background:#fff;border:2px solid #ff9800;border-radius:8px;">' +
      '<button type="button" id="btnScanExplorer" style="display:block;width:100%;padding:12px;background:#2e7d32;color:#fff;border:0;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;">Varrer estrutura Explorer</button>' +
      '<p style="margin:8px 0 0;font-size:13px;color:#0d47a1;">Mont10 no Explorer → <b>Varrer</b></p></div>' +
      '<div style="display:none" id="hiddenFields">' +
      '<textarea id="pasteArea"></textarea>' +
      '<button type="button" id="btnImportPaste"></button><button type="button" id="btnLoadExample"></button>' +
      '<button type="button" id="btnSyncExplorer"></button><button type="button" id="btnRefresh"></button>' +
      '<input type="file" id="snapshotFileInput" /><input type="text" id="explorerObjectId" />' +
      '<input type="text" id="explorerObjectName" /><button type="button" id="btnLoadObjectId"></button>' +
      '<select id="filterMaturity"><option value="all">all</option></select>' +
      '<select id="filterType"><option value="all">all</option></select>' +
      '<select id="filterApproval"><option value="all">all</option></select>' +
      '<select id="filterPP"><option value="all">all</option></select>' +
      '<input type="search" id="searchInput" /></div>' +
      '<main style="padding:8px 14px 16px;">' +
      '<section id="kpiGrid" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;"></section>' +
      '<section style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">' +
      '<div style="background:#fff;border:1px solid #dde3ea;border-radius:6px;padding:8px;min-height:120px;"><canvas id="chartMaturity"></canvas></div>' +
      '<div style="background:#fff;border:1px solid #dde3ea;border-radius:6px;padding:8px;min-height:120px;"><canvas id="chartType"></canvas></div>' +
      '<div style="background:#fff;border:1px solid #dde3ea;border-radius:6px;padding:8px;min-height:120px;"><canvas id="chartRevision"></canvas></div>' +
      '<div style="background:#fff;border:1px solid #dde3ea;border-radius:6px;padding:8px;min-height:120px;"><canvas id="chartApproval"></canvas></div></section>' +
      '<section style="background:#fff;border:1px solid #dde3ea;border-radius:6px;overflow:hidden;">' +
      '<div style="padding:8px 12px;font-weight:600;background:#f8f9fa;border-bottom:1px solid #dde3ea;">E-BOM — <span id="tableProductLabel">—</span></div>' +
      '<div style="max-height:200px;overflow:auto;"><table id="bomTable" style="width:100%;border-collapse:collapse;font-size:12px;"><thead><tr></tr></thead><tbody></tbody></table></div></section></main>' +
      '<div id="loadingOverlay" style="display:none;position:absolute;inset:0;background:rgba(255,255,255,0.8);align-items:center;justify-content:center;">Varrendo…</div></div>';

    var painted = false;
    var booted = false;

    function paint() {
      if (typeof widget === 'undefined' || !widget || !widget.body) return false;
      widget.body.innerHTML = UI_HTML;
      widget.body.style.minHeight = '420px';
      widget.body.style.background = '#f0f6fa';
      painted = true;
      return true;
    }

    function setBar(msg, kind) {
      var root = (typeof widget !== 'undefined' && widget && widget.body) ? widget.body : null;
      if (!root) return;
      var el = root.querySelector('#statusBar');
      if (!el) return;
      var bg = '#e3f2fd', fg = '#0d47a1';
      if (kind === 'ok') { bg = '#e8f5e9'; fg = '#1b5e20'; }
      if (kind === 'warn') { bg = '#fff3e0'; fg = '#e65100'; }
      if (kind === 'error') { bg = '#ffebee'; fg = '#b71c1c'; }
      el.textContent = msg;
      el.style.background = bg;
      el.style.color = fg;
    }

    function getRequire() {
      try {
        if (widget && widget.requirejs) return widget.requirejs;
      } catch (e0) { /* */ }
      if (typeof require !== 'undefined') return require;
      return null;
    }

    function loadScript(url, optional) {
      return new Promise(function (resolve, reject) {
        var s = document.createElement('script');
        s.src = url;
        s.onload = function () { resolve(); };
        s.onerror = function () {
          if (optional) resolve();
          else reject(new Error('Bloqueado: ' + url));
        };
        document.head.appendChild(s);
      });
    }

    function bootModules() {
      if (booted) return;
      booted = true;
      setBar('Carregando WAFData…', 'info');
      var req = getRequire();
      var waf = Promise.resolve();
      if (typeof WAFData === 'undefined' || !WAFData.authenticatedRequest) {
        if (!req) {
          setBar('Sem WAFData — confirme Additional App Widget.', 'error');
          return;
        }
        waf = new Promise(function (res, rej) {
          req(
            ['DS/WAFData/WAFData', 'DS/i3DXCompassServices/i3DXCompassServices', 'DS/PlatformAPI/PlatformAPI'],
            function (WAF, Compass, PAPI) {
              window.WAFData = WAF;
              window.__3DX_COMPASS__ = Compass;
              window.__3DX_PLATFORM_API__ = PAPI;
              res();
            },
            rej
          );
        });
      }
      waf
        .then(function () { return loadScript(GH + 'assets/vendor/chart.umd.min.js?v=' + VER, true); })
        .then(function () { return loadScript(GH + 'assets/js/bom-bundle.js?v=' + VER, false); })
        .then(function () {
          if (typeof App !== 'undefined' && App.run) {
            if (typeof detectRuntimeMode === 'function') detectRuntimeMode();
            App.run();
            setBar('Pronto — Mont10 → Varrer.', 'ok');
          } else {
            setBar('Bundle não carregou. ⋮ Atualizar.', 'error');
          }
        })
        .catch(function (err) {
          setBar('Varredura falhou: ' + (err.message || err), 'error');
        });
    }

    function onLoad() {
      if (!paint()) return;
      bootModules();
    }

    function wait() {
      if (typeof widget !== 'undefined' && widget && widget.addEvent) {
        widget.addEvent('onLoad', onLoad);
        widget.addEvent('onRefresh', function () {
          if (typeof App !== 'undefined' && App.runExplorerScan) {
            var b = widget.body.querySelector('#btnScanExplorer');
            App.runExplorerScan(b);
          }
        });
        if (widget.body && !String(widget.body.innerHTML || '').replace(/\s/g, '')) {
          window.setTimeout(onLoad, 0);
        } else if (!booted) {
          window.setTimeout(onLoad, 0);
        }
        return;
      }
      window.setTimeout(wait, 80);
    }

    wait();

    window.setTimeout(function () {
      if (!painted && typeof widget !== 'undefined' && widget && widget.body) {
        onLoad();
      }
    }, 2000);
  //]]>
  </script>
</head>
<body></body>
</html>
