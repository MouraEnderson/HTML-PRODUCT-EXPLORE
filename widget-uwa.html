<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
  <title>BOM Analytics</title>
  <script type="text/javascript" src="https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/assets/vendor/chart.umd.min.js"></script>
  <script type="text/javascript">
  //<![CDATA[
    var BOM_REPO = 'https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/';
    var BOM_VER = '20260607';
    window.__3DX_TRUSTED_WIDGET__ = true;

    var BOM_SCRIPTS = [
      'assets/js/config.js',
      'assets/js/platform/widget-runtime.js',
      'assets/js/platform/platform-bridge.js',
      'assets/js/platform/context.js',
      'assets/js/platform/compass.js',
      'assets/js/platform/waf-client.js',
      'assets/js/integration/3dx-content-parser.js',
      'assets/js/integration/enovia-api.js',
      'assets/js/integration/search-api.js',
      'assets/js/integration/product-explorer-bridge.js',
      'assets/js/services/file-import-service.js',
      'assets/js/services/product-search-service.js',
      'assets/js/services/attribute-service.js',
      'assets/js/services/physical-product-service.js',
      'assets/js/services/bom-service.js',
      'assets/js/processing/bom-normalizer.js',
      'assets/js/processing/metrics-engine.js',
      'assets/js/processing/anomaly-detector.js',
      'assets/js/ui/kpi-cards.js',
      'assets/js/ui/charts-manager.js',
      'assets/js/ui/filters.js',
      'assets/js/ui/data-table.js',
      'assets/js/ui/bom-tree.js',
      'assets/js/ui/explorer-sync-panel.js',
      'assets/js/app.js'
    ];

    function bomLoadCss() {
      var l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = BOM_REPO + 'assets/css/dashboard.css?v=' + BOM_VER;
      document.getElementsByTagName('head')[0].appendChild(l);
    }

    function bomLoadScript(i, done) {
      if (i >= BOM_SCRIPTS.length) {
        done();
        return;
      }
      var s = document.createElement('script');
      s.src = BOM_REPO + BOM_SCRIPTS[i] + '?v=' + BOM_VER;
      s.onload = function () { bomLoadScript(i + 1, done); };
      s.onerror = function () { bomLoadScript(i + 1, done); };
      document.getElementsByTagName('head')[0].appendChild(s);
    }

    function bomMountBody() {
      var html = document.getElementById('bom-app-template');
      if (!html) return;
      /* DOM no document — getElementById não acha nós só dentro de widget.body */
      document.body.innerHTML = html.innerHTML;
      document.body.className = 'ui-explorer-only';
    }

    function bomBoot() {
      bomLoadCss();
      bomMountBody();
      bomLoadScript(0, function () {
        try {
          if (typeof WidgetRuntime !== 'undefined') WidgetRuntime.markTrusted();
          var ov = document.getElementById('loadingOverlay');
          if (ov) ov.classList.add('hidden');
        } catch (e1) { /* */ }
        window.setTimeout(function () {
          if (typeof App !== 'undefined' && App.forceStopLoading) {
            App.forceStopLoading();
          }
        }, 22000);
      });
    }

    if (typeof widget !== 'undefined' && widget.addEvent) {
      widget.addEvent('onLoad', bomBoot);
      widget.addEvent('onRefresh', function () {
        var sel = typeof ProductExplorerBridge !== 'undefined' && ProductExplorerBridge.getSelection();
        if (sel && typeof App !== 'undefined') App.loadBom(sel.physicalid);
      });
    } else {
      document.addEventListener('DOMContentLoaded', bomBoot);
    }
  //]]>
  </script>
</head>
<body>
<div id="bom-app-template" style="display:none">
  <header class="app-header explorer-header">
    <h1>BOM Analytics</h1>
    <p class="explorer-product">Product Structure Explorer: <strong id="selectionLabel">—</strong></p>
    <button type="button" class="ui-hidden" id="btnSyncExplorer">sync</button>
    <button type="button" class="ui-hidden" id="btnRefresh">refresh</button>
  </header>
  <div id="statusBar" class="status-bar">Carregando…</div>
  <div class="ui-hidden" aria-hidden="true">
    <input type="text" id="explorerObjectId" />
    <input type="text" id="explorerObjectName" />
    <button id="btnLoadObjectId"></button>
    <button id="btnCopyHelp"></button>
    <div id="syncHelpText"></div>
    <select id="filterMaturity"><option value="all">all</option></select>
    <select id="filterType"><option value="all">all</option></select>
    <select id="filterApproval"><option value="all">all</option></select>
    <select id="filterPP"><option value="all">all</option></select>
    <div id="bomTree"></div>
  </div>
  <main class="dashboard-explorer">
    <section id="kpiGrid" class="kpi-grid kpi-compact"></section>
    <section class="charts-grid charts-main">
      <div class="chart-card"><canvas id="chartMaturity"></canvas></div>
      <div class="chart-card"><canvas id="chartType"></canvas></div>
      <div class="chart-card"><canvas id="chartRevision"></canvas></div>
      <div class="chart-card"><canvas id="chartApproval"></canvas></div>
    </section>
    <section class="panel table-panel">
      <div class="panel-header">E-BOM — <span id="tableProductLabel">—</span></div>
      <div class="filter-row"><input type="search" id="searchInput" placeholder="Filtrar tabela…" /></div>
      <div class="table-scroll table-scroll-wide">
        <table id="bomTable" class="data-table"><thead><tr></tr></thead><tbody></tbody></table>
      </div>
    </section>
  </main>
  <div id="loadingOverlay" class="loading-overlay hidden">Carregando E-BOM…</div>
</div>
</body>
</html>
