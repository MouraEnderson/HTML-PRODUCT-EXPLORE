<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>BOM Analytics</title>
  <script type="text/javascript">
    window.__3DX_TRUSTED_WIDGET__ = true;
    window.__3DX_BOOT_DEFER__ = true;
  </script>
  <style type="text/css">
    .boot-splash {
      padding: 14px;
      font: 13px "Segoe UI", sans-serif;
      color: #005686;
      background: #e3f2fd;
      min-height: 48px;
    }
  </style>
</head>
<body>
  <div id="bom-app-template" style="display:none">
    <header class="app-header explorer-header">
      <h1>BOM Analytics</h1>
      <p class="explorer-product">Estrutura: <strong id="selectionLabel">—</strong></p>
      <button type="button" class="ui-hidden" id="btnSyncExplorer">sync</button>
      <button type="button" class="ui-hidden" id="btnRefresh">refresh</button>
    </header>
    <div id="statusBar" class="status-bar status-warn">Iniciando…</div>
    <section class="snapshot-panel snapshot-panel-focus">
      <button type="button" id="btnScanExplorer" class="btn-scan-main">Varrer estrutura Explorer</button>
      <p class="snapshot-steps">① Grade Explorer (Mont10…) → ② <strong>Ctrl+C</strong> → ③ <strong>Varrer</strong></p>
      <textarea id="pasteArea" class="paste-area" rows="3" placeholder="Ou cole aqui…"></textarea>
      <div class="snapshot-actions">
        <button type="button" id="btnImportPaste" class="btn-primary">Importar cola</button>
        <button type="button" id="btnLoadExample" class="btn-secondary">Teste 3 itens</button>
        <input type="file" id="snapshotFileInput" accept=".json" class="ui-hidden" />
        <button type="button" id="btnLoadSnapshotFile" class="btn-secondary">JSON</button>
      </div>
    </section>
    <div class="ui-hidden" aria-hidden="true">
      <input type="text" id="explorerObjectId" />
      <input type="text" id="explorerObjectName" />
      <button type="button" id="btnLoadObjectId"></button>
      <select id="filterMaturity"><option value="all">all</option></select>
      <select id="filterType"><option value="all">all</option></select>
      <select id="filterApproval"><option value="all">all</option></select>
      <select id="filterPP"><option value="all">all</option></select>
    </div>
    <main class="dashboard-explorer">
      <section id="kpiGrid" class="kpi-grid kpi-compact"></section>
      <section class="charts-grid charts-main">
        <div class="chart-card"><canvas id="chartMaturity"></canvas></div>
        <div class="chart-card"><canvas id="chartType"></canvas></div>
        <div class="chart-card"><canvas id="chartRevision"></canvas></div>
        <div class="chart-card"><canvas id="chartApproval"></canvas></div>
      </section>
      <section class="panel table-panel">
        <div class="panel-header">E-BOM — <span id="tableProductLabel">—</span></div>
        <div class="filter-row"><input type="search" id="searchInput" placeholder="Filtrar…" /></div>
        <div class="table-scroll table-scroll-wide">
          <table id="bomTable" class="data-table"><thead><tr></tr></thead><tbody></tbody></table>
        </div>
      </section>
    </main>
    <div id="loadingOverlay" class="loading-overlay hidden">Varrendo…</div>
  </div>
  <script type="text/javascript">
  //<![CDATA[
    var GH = 'https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/';
    var BOOT_VER = 'uwa20260602e';
    var bootOnce = false;

    function splash(msg) {
      if (typeof widget === 'undefined' || !widget || !widget.body) return;
      widget.body.innerHTML =
        '<div class="boot-splash">' + (msg || 'BOM Analytics — carregando…') + '</div>';
      widget.body.style.minHeight = '420px';
      widget.body.style.background = '#f0f6fa';
    }

    function bomEntry() {
      if (bootOnce) return;
      bootOnce = true;
      splash('BOM Analytics — carregando módulos…');

      var s = document.createElement('script');
      s.type = 'text/javascript';
      s.src = GH + 'assets/js/boot.js?v=' + BOOT_VER;
      s.onload = function () {
        try {
          if (typeof BomBoot !== 'undefined' && widget && widget.body) {
            BomBoot.run(widget.body);
            return;
          }
        } catch (err) {
          splash('Erro ao iniciar: ' + (err.message || err));
          return;
        }
        splash('boot.js carregou mas BomBoot não existe.');
      };
      s.onerror = function () {
        splash('Falha ao carregar boot.js — TI pode bloquear github.io no 3DDashboard.');
      };
      document.head.appendChild(s);
    }

    function bindWidget() {
      if (typeof widget === 'undefined' || !widget || !widget.addEvent) return false;
      widget.addEvent('onLoad', bomEntry);
      try {
        widget.addEvent('onRefresh', function () {
          if (typeof App !== 'undefined' && App.runExplorerScan) {
            var b = widget.body && widget.body.querySelector('#btnScanExplorer');
            App.runExplorerScan(b);
          }
        });
      } catch (e1) { /* */ }
      if (widget.body && !String(widget.body.innerHTML || '').replace(/\s/g, '')) {
        window.setTimeout(bomEntry, 0);
      }
      return true;
    }

    (function wait() {
      if (bindWidget()) return;
      window.setTimeout(wait, 80);
    })();

    window.setTimeout(function () {
      if (!bootOnce) bomEntry();
    }, 2800);
  //]]>
  </script>
</body>
</html>
