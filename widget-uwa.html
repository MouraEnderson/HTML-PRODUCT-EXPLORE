<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
  <title>BOM Analytics</title>
  <link rel="stylesheet" type="text/css" href="https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/assets/css/dashboard.css?v=scan1" />
  <script type="text/javascript">window.__3DX_TRUSTED_WIDGET__=true;window.__3DX_BOOT_DEFER__=true;</script>
  <script type="text/javascript" src="https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/assets/vendor/chart.umd.min.js"></script>
  <script type="text/javascript" src="https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/assets/js/bom-bundle.js?v=snapshot20260601d"></script>
  <script type="text/javascript">
  //<![CDATA[
    var __bomMounted = false;
    function bomGetMountTarget() {
      try { if (typeof widget !== 'undefined' && widget && widget.body) return widget.body; } catch (e) {}
      return document.body;
    }
    function bomMount() {
      if (__bomMounted) return true;
      var tpl = document.getElementById('bom-app-template');
      if (!tpl) return false;
      var target = bomGetMountTarget();
      if (!target) return false;
      if (target.querySelector && target.querySelector('#statusBar')) { __bomMounted = true; return true; }
      target.innerHTML = tpl.innerHTML;
      target.className = 'ui-explorer-only';
      __bomMounted = true;
      return true;
    }
    function bomStartApp() {
      if (!bomMount()) return;
      var bar = bomGetMountTarget().querySelector('#statusBar');
      if (typeof App === 'undefined') {
        if (bar) bar.textContent = 'Bundle não carregou — Ctrl+F5 (v scan d)';
        return;
      }
      try { App.run(); } catch (e) { if (bar) bar.textContent = 'Erro: ' + (e.message || e); }
    }
    function bomOnLoad() {
      bomMount();
      if (typeof require !== 'undefined') {
        require(['DS/WAFData/WAFData','DS/i3DXCompassServices/i3DXCompassServices','DS/PlatformAPI/PlatformAPI'],
          function (WAF, Compass, PlatformAPI) {
            window.WAFData = WAF; window.__3DX_COMPASS__ = Compass; window.__3DX_PLATFORM_API__ = PlatformAPI;
            bomStartApp();
          }, function () { bomStartApp(); });
      } else { bomStartApp(); }
    }
    function bomScheduleBoot() { bomOnLoad(); setTimeout(bomOnLoad, 80); setTimeout(bomOnLoad, 500); setTimeout(bomOnLoad, 1500); }
    if (typeof widget !== 'undefined' && widget.addEvent) {
      widget.addEvent('onLoad', bomScheduleBoot);
      widget.addEvent('onRefresh', function () {
        if (typeof App !== 'undefined' && App.runExplorerScan) {
          var b = document.getElementById('btnScanExplorer');
          App.runExplorerScan(b);
        }
      });
    }
    if (document.addEventListener) document.addEventListener('DOMContentLoaded', bomScheduleBoot);
    bomScheduleBoot();
  //]]>
  </script>
</head>
<body class="ui-explorer-only">
  <div id="bom-boot-fallback" style="padding:8px;font:12px sans-serif;color:#005686;">Carregando BOM Analytics v-scan…</div>
  <div id="bom-app-template" style="display:none">
    <header class="app-header explorer-header">
      <h1>BOM Analytics</h1>
      <p class="explorer-product">Estrutura: <strong id="selectionLabel">—</strong></p>
    </header>
    <div id="statusBar" class="status-bar status-warn">Clique Varrer (depois Ctrl+C na grade do Explorer)</div>
    <section class="snapshot-panel snapshot-panel-focus">
      <button type="button" id="btnScanExplorer" class="btn-scan-main">Varrer estrutura Explorer</button>
      <p class="snapshot-steps">Antes de varrer: grade à esquerda → selecione <strong>Mont10, M1, M2</strong> → <strong>Ctrl+C</strong> → depois clique <strong>Varrer</strong></p>
      <textarea id="pasteArea" class="paste-area" rows="3" placeholder="Opcional: cole aqui se Varrer falhar…"></textarea>
      <div class="snapshot-actions">
        <button type="button" id="btnImportPaste" class="btn-primary">Importar cola</button>
        <button type="button" id="btnLoadExample" class="btn-secondary">Teste 3 itens</button>
        <input type="file" id="snapshotFileInput" accept=".json" class="ui-hidden" />
        <button type="button" id="btnLoadSnapshotFile" class="btn-secondary">JSON</button>
      </div>
    </section>
    <div class="ui-hidden" aria-hidden="true">
      <button id="btnSyncExplorer"></button><button id="btnRefresh"></button>
      <input id="explorerObjectId" /><input id="explorerObjectName" /><button id="btnLoadObjectId"></button>
      <select id="filterMaturity"><option value="all">all</option></select>
      <select id="filterType"><option value="all">all</option></select>
      <select id="filterApproval"><option value="all">all</option></select>
      <select id="filterPP"><option value="all">all</option></select>
    </div>
    <main class="dashboard-explorer">
      <section id="kpiGrid" class="kpi-grid kpi-compact"></section>
      <section class="charts-grid charts-main">
        <div class="chart-card"><canvas id="chartMaturity"></canvas></div>
        <div class="chart-card"><canvas id="chartType"></canvas></div>
        <div class="chart-card"><canvas id="chartRevision"></canvas></div>
        <div class="chart-card"><canvas id="chartApproval"></canvas></div>
      </section>
      <section class="panel table-panel">
        <div class="panel-header">E-BOM — <span id="tableProductLabel">—</span></div>
        <div class="filter-row"><input type="search" id="searchInput" placeholder="Filtrar…" /></div>
        <div class="table-scroll table-scroll-wide">
          <table id="bomTable" class="data-table"><thead><tr></tr></thead><tbody></tbody></table>
        </div>
      </section>
    </main>
    <div id="loadingOverlay" class="loading-overlay hidden">Varrendo…</div>
  </div>
</body>
</html>
