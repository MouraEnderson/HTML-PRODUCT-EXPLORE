<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
  <title>BOM Analytics</title>
  <style type="text/css">
    html, body { height: 100%; margin: 0; overflow: hidden; }
    #bom-root { height: 100%; min-height: 320px; }
    .boot-msg { padding: 14px; font-family: "Segoe UI", Arial, sans-serif; color: #333; }
    .boot-err { color: #b71c1c; }
  </style>
  <script type="text/javascript">
  //<![CDATA[
    var BOM_REPO = 'https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/';
    var BOM_APP = BOM_REPO + 'index.html';

    function bomMsg(text, isErr) {
      try {
        if (typeof widget !== 'undefined' && widget && widget.body) {
          widget.body.innerHTML = '<div class="boot-msg' + (isErr ? ' boot-err' : '') + '">' + text + '</div>';
        } else {
          document.body.innerHTML = '<div class="boot-msg">' + text + '</div>';
        }
      } catch (e) { /* */ }
    }

    function bomLoadIframe() {
      var root = document.getElementById('bom-root');
      if (!root && typeof widget !== 'undefined' && widget.body) {
        widget.body.innerHTML = '<div id="bom-root"></div>';
        root = widget.body.firstChild;
      }
      if (!root) return;
      var q = '';
      try { q = window.location.search || ''; } catch (e1) { /* */ }
      var iframe = document.createElement('iframe');
      iframe.id = 'bomFrame';
      iframe.title = 'BOM Analytics';
      iframe.setAttribute('src', BOM_APP + q);
      iframe.style.cssText = 'width:100%;height:100%;border:0;display:block;';
      root.innerHTML = '';
      root.appendChild(iframe);
      try {
        if (widget.setBodySize) widget.setBodySize();
        if (widget.setViewport) widget.setViewport({ height: '100%' });
      } catch (e2) { /* */ }
    }

    function bomInit() {
      bomMsg('BOM Analytics — iniciando UWA…');
      if (typeof widget === 'undefined') {
        bomMsg('Abra pelo 3DDashboard (Additional App Widget). URL: ' + BOM_APP, true);
        return;
      }
      widget.addEvent('onLoad', function () {
        bomLoadIframe();
      });
      widget.addEvent('onRefresh', function () {
        var f = document.getElementById('bomFrame');
        if (f) f.src = f.src;
      });
      try {
        if (widget.body) {
          widget.body.innerHTML = '<div id="bom-root"></div>';
        }
      } catch (e3) { /* */ }
    }

    bomInit();
  //]]>
  </script>
</head>
<body>
  <div id="bom-root" class="boot-msg">BOM Analytics — aguardando 3DDashboard…</div>
</body>
</html>
