<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>BOM Analytics</title>
  <script type="text/javascript">
    window.__3DX_TRUSTED_WIDGET__ = true;
    window.__3DX_BOOT_DEFER__ = true;
  </script>
  <style type="text/css">
    body { margin: 0; }
    .ui-explorer-only { min-height: 420px; background: #f0f6fa; font: 13px "Segoe UI", sans-serif; color: #1a2332; }
    .explorer-header { padding: 10px 14px; background: #fff; border-bottom: 1px solid #dde3ea; }
    .explorer-header h1 { margin: 0; font-size: 1rem; color: #005686; }
    .explorer-product { margin: 4px 0 0; font-size: 0.82rem; color: #5c6b7a; }
    .status-bar { padding: 8px 14px; font-size: 0.85rem; }
    .status-info { background: #e3f2fd; color: #0d47a1; }
    .status-ok { background: #e8f5e9; color: #1b5e20; }
    .status-warn { background: #fff3e0; color: #e65100; }
    .status-error { background: #ffebee; color: #b71c1c; }
    .snapshot-panel { margin: 10px 14px; padding: 12px; background: #fff; border: 2px solid #ff9800; border-radius: 8px; }
    .btn-scan-main {
      display: block; width: 100%; padding: 12px; margin-bottom: 8px;
      background: #2e7d32; color: #fff; border: 0; border-radius: 6px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    .btn-scan-main:disabled { background: #9e9e9e; cursor: wait; }
    .snapshot-steps { margin: 0 0 8px; font-size: 0.85rem; color: #0d47a1; }
    .dashboard-explorer { padding: 8px 14px 16px; }
    .kpi-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .kpi-card { background: #fff; border: 1px solid #dde3ea; border-radius: 6px; padding: 8px 12px; min-width: 100px; }
    .kpi-card b { display: block; font-size: 1.2rem; color: #005686; }
    .charts-main { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .chart-card { background: #fff; border: 1px solid #dde3ea; border-radius: 6px; padding: 8px; min-height: 140px; }
    .table-panel { background: #fff; border: 1px solid #dde3ea; border-radius: 6px; overflow: hidden; }
    .panel-header { padding: 8px 12px; font-weight: 600; background: #f8f9fa; border-bottom: 1px solid #dde3ea; }
    .table-scroll { max-height: 220px; overflow: auto; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table th, .data-table td { border: 1px solid #e0e0e0; padding: 4px 6px; text-align: left; }
    .data-table th { background: #f5f5f5; position: sticky; top: 0; }
    .ui-hidden { display: none !important; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; z-index: 99; }
    .loading-overlay.hidden { display: none; }
    .chrome-hint { padding: 8px 14px; font-size: 12px; background: #fff8e1; color: #6d4c00; }
  </style>
</head>
<body>
  <!-- Sempre visível (Chrome + 3DDashboard). Não usar display:none no template. -->
  <div id="app-shell" class="ui-explorer-only">
    <p class="chrome-hint" id="envHint">Carregando BOM Analytics…</p>
    <header class="app-header explorer-header">
      <h1>BOM Analytics</h1>
      <p class="explorer-product">Estrutura: <strong id="selectionLabel">—</strong></p>
    </header>
    <div id="statusBar" class="status-bar status-info">Iniciando…</div>
    <section class="snapshot-panel">
      <button type="button" id="btnScanExplorer" class="btn-scan-main">Varrer estrutura Explorer</button>
      <p class="snapshot-steps">Mont10 no Explorer → <strong>Varrer</strong> (API + snapshot + gráficos)</p>
    </section>
    <div class="ui-hidden" aria-hidden="true">
      <textarea id="pasteArea" rows="2"></textarea>
      <button type="button" id="btnImportPaste"></button>
      <button type="button" id="btnLoadExample"></button>
      <button type="button" id="btnSyncExplorer"></button>
      <button type="button" id="btnRefresh"></button>
      <input type="file" id="snapshotFileInput" accept=".json" />
      <input type="text" id="explorerObjectId" />
      <input type="text" id="explorerObjectName" />
      <button type="button" id="btnLoadObjectId"></button>
      <select id="filterMaturity"><option value="all">all</option></select>
      <select id="filterType"><option value="all">all</option></select>
      <select id="filterApproval"><option value="all">all</option></select>
      <select id="filterPP"><option value="all">all</option></select>
      <input type="search" id="searchInput" />
    </div>
    <main class="dashboard-explorer">
      <section id="kpiGrid" class="kpi-grid kpi-compact"></section>
      <section class="charts-grid charts-main">
        <div class="chart-card"><canvas id="chartMaturity"></canvas></div>
        <div class="chart-card"><canvas id="chartType"></canvas></div>
        <div class="chart-card"><canvas id="chartRevision"></canvas></div>
        <div class="chart-card"><canvas id="chartApproval"></canvas></div>
      </section>
      <section class="panel table-panel">
        <div class="panel-header">E-BOM — <span id="tableProductLabel">—</span></div>
        <div class="table-scroll table-scroll-wide">
          <table id="bomTable" class="data-table"><thead><tr></tr></thead><tbody></tbody></table>
        </div>
      </section>
    </main>
    <div id="loadingOverlay" class="loading-overlay hidden">Varrendo…</div>
  </div>

  <script type="text/javascript">
  //<![CDATA[
    /* Scripts/CSS sempre no GitHub Pages (MIME correto). Não usar jsDelivr no Chrome — abre só código. */
    var GH = 'https://mouraenderson.github.io/HTML-PRODUCT-EXPLORE/';
    var VER = 'uwa20260603d';
    var appStarted = false;

    function getMountRoot() {
      if (typeof widget !== 'undefined' && widget && widget.body) return widget.body;
      return document.getElementById('app-shell');
    }

    function setBar(msg, kind) {
      var root = getMountRoot();
      if (!root) return;
      var el = root.querySelector('#statusBar');
      if (!el) return;
      el.textContent = msg;
      el.className = 'status-bar status-' + (kind || 'info');
    }

    function setEnvHint() {
      var hint = document.getElementById('envHint');
      if (!hint) return;
      if (typeof widget !== 'undefined' && widget && widget.body) {
        hint.textContent = 'Modo 3DDashboard (Additional App) — varredura API ativa.';
      } else {
        hint.textContent =
          'Modo Chrome: interface visível; varredura real só no 3DDashboard (Additional App).';
      }
    }

    function syncToWidgetBody() {
      if (typeof widget === 'undefined' || !widget || !widget.body) return;
      var shell = document.getElementById('app-shell');
      if (!shell) return;
      widget.body.innerHTML = shell.innerHTML;
      widget.body.className = 'ui-explorer-only';
      widget.body.style.minHeight = '420px';
      shell.style.display = 'none';
    }

    function getRequire() {
      try {
        if (typeof widget !== 'undefined' && widget && widget.requirejs) return widget.requirejs;
      } catch (e0) { /* */ }
      if (typeof require !== 'undefined') return require;
      return null;
    }

    function loadScript(url, optional) {
      return new Promise(function (resolve, reject) {
        var s = document.createElement('script');
        s.type = 'text/javascript';
        s.charset = 'UTF-8';
        s.src = url;
        s.onload = function () { resolve(url); };
        s.onerror = function () {
          if (optional) resolve(null);
          else reject(new Error('Script bloqueado: ' + url));
        };
        (document.head || document.documentElement).appendChild(s);
      });
    }

    function loadWafModules() {
      return new Promise(function (resolve, reject) {
        if (typeof WAFData !== 'undefined' && WAFData.authenticatedRequest) {
          resolve();
          return;
        }
        var req = getRequire();
        if (!req) {
          reject(new Error('WAFData só no 3DDashboard (Additional App Widget)'));
          return;
        }
        setBar('Carregando WAFData…', 'info');
        req(
          ['DS/WAFData/WAFData', 'DS/i3DXCompassServices/i3DXCompassServices', 'DS/PlatformAPI/PlatformAPI'],
          function (WAF, Compass, PAPI) {
            window.WAFData = WAF;
            window.__3DX_COMPASS__ = Compass;
            window.__3DX_PLATFORM_API__ = PAPI;
            resolve();
          },
          function (err) {
            reject(err || new Error('Falha require WAFData'));
          }
        );
      });
    }

    function startApplication() {
      if (appStarted) return;
      appStarted = true;
      try {
        if (typeof detectRuntimeMode === 'function') detectRuntimeMode();
        if (typeof App !== 'undefined' && App.run) {
          App.run();
          setBar('Pronto — Mont10 no Explorer → Varrer.', 'ok');
          return;
        }
        setBar('Bundle não carregou (menu ⋮ Atualizar no dashboard).', 'error');
      } catch (err) {
        setBar('Erro: ' + (err.message || err), 'error');
      }
    }

    function bootPipeline() {
      setEnvHint();
      syncToWidgetBody();
      setBar('Carregando módulos BOM…', 'info');
      loadWafModules()
        .then(function () {
          return loadScript(GH + 'assets/vendor/chart.umd.min.js?v=' + VER, true);
        })
        .then(function () {
          return loadScript(GH + 'assets/js/bom-bundle.js?v=' + VER, false);
        })
        .then(function () {
          startApplication();
        })
        .catch(function (err) {
          var msg = (err && err.message) ? err.message : String(err);
          if (msg.indexOf('3DDashboard') >= 0) {
            setBar(msg + ' — teste varredura no dashboard, não no Chrome.', 'warn');
          } else {
            setBar('Varredura falhou: ' + msg, 'error');
          }
        });
    }

    function onWidgetReady() {
      syncToWidgetBody();
      bootPipeline();
    }

    function widgetLoading() {
      setEnvHint();
      if (typeof widget !== 'undefined' && widget && widget.addEvent) {
        widget.addEvent('onLoad', onWidgetReady);
        widget.addEvent('onRefresh', function () {
          if (typeof App !== 'undefined' && App.runExplorerScan) {
            var b = getMountRoot().querySelector('#btnScanExplorer');
            App.runExplorerScan(b);
          }
        });
        window.setTimeout(onWidgetReady, 0);
        return;
      }
      window.setTimeout(widgetLoading, 100);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bootPipeline);
    } else {
      bootPipeline();
    }
    widgetLoading();
  //]]>
  </script>
</body>
</html>
